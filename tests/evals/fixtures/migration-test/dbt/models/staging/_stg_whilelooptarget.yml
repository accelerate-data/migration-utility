version: 2

models:
  - name: stg_whilelooptarget
    description: "Migrated from silver.usp_load_WhileLoopTarget. Target: silver.WhileLoopTarget."
    columns:
      - name: ProductAlternateKey
        description: "Product identifier cast from integer to nvarchar(25)"
        data_tests:
          - not_null
      - name: EnglishProductName
        description: "English product name copied from bronze.Product.ProductName"
        data_tests:
          - not_null
    unit_tests:
      - name: test_gap_cast_productid_as_string
        model: stg_whilelooptarget
        given:
          - input: source('bronze', 'product')
            rows:
              - {ProductID: 42, ProductName: "Widget Pro"}
        expect:
          rows:
            - {ProductAlternateKey: "42", EnglishProductName: "Widget Pro"}
      - name: test_gap_full_reload_all_rows_present
        model: stg_whilelooptarget
        given:
          - input: source('bronze', 'product')
            rows:
              - {ProductID: 1,    ProductName: "Alpha"}
              - {ProductID: 2,    ProductName: "Beta"}
              - {ProductID: 1001, ProductName: "Beyond Batch"}
        expect:
          rows:
            - {ProductAlternateKey: "1",    EnglishProductName: "Alpha"}
            - {ProductAlternateKey: "2",    EnglishProductName: "Beta"}
            - {ProductAlternateKey: "1001", EnglishProductName: "Beyond Batch"}
      - name: test_gap_large_productid_fits_nvarchar25
        model: stg_whilelooptarget
        given:
          - input: source('bronze', 'product')
            rows:
              - {ProductID: 99999999, ProductName: "LargeID Product"}
        expect:
          rows:
            - {ProductAlternateKey: "99999999", EnglishProductName: "LargeID Product"}
