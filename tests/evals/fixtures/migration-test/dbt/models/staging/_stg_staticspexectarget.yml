version: 2

models:
  - name: stg_staticspexectarget
    description: "Migrated from silver.usp_load_StaticSpExecTarget. Target: silver.StaticSpExecTarget."
    columns:
      - name: ProductAlternateKey
        description: "Primary key. Business key derived from cast(bronze.Product.ProductID as varchar(25))."
        data_tests:
          - unique
          - not_null
      - name: EnglishProductName
        description: "Product name projected from bronze.Product.ProductName."

unit_tests:
  - name: test_table_rows_present_all_inserted
    model: stg_staticspexectarget
    given:
      - input: source('bronze', 'product')
        rows:
          - ProductID: 1
            ProductName: Widget A
            ProductNumber: WGT-001
            MakeFlag: true
            FinishedGoodsFlag: true
            SafetyStockLevel: 100
            ReorderPoint: 50
            StandardCost: 10.00
            ListPrice: 19.99
            DaysToManufacture: 5
            SellStartDate: "2020-01-01"
            ModifiedDate: "2024-01-01"
          - ProductID: 2
            ProductName: Widget B
            ProductNumber: WGT-002
            MakeFlag: false
            FinishedGoodsFlag: true
            SafetyStockLevel: 200
            ReorderPoint: 75
            StandardCost: 20.00
            ListPrice: 39.99
            DaysToManufacture: 3
            SellStartDate: "2021-06-15"
            ModifiedDate: "2024-03-01"
    expect:
      rows:
        - ProductAlternateKey: "1"
          EnglishProductName: Widget A
        - ProductAlternateKey: "2"
          EnglishProductName: Widget B
  - name: test_table_empty_source_clears_target
    model: stg_staticspexectarget
    given:
      - input: source('bronze', 'product')
        rows: []
    expect:
      rows: []
  - name: test_gap_large_product_id_cast
    model: stg_staticspexectarget
    given:
      - input: source('bronze', 'product')
        rows:
          - ProductID: 9999999
            ProductName: High-ID Product
    expect:
      rows:
        - ProductAlternateKey: "9999999"
          EnglishProductName: High-ID Product
