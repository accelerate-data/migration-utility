version: 2

models:
- name: insertselecttarget
  description: Migrated insert-select projection for silver.InsertSelectTarget.
  columns:
  - name: ProductAlternateKey
    description: Business key derived from bronze.Product.ProductID.
    data_tests:
    - not_null
    - unique
  - name: EnglishProductName
    description: Product name projected from bronze.Product.ProductName.
- name: updatejointarget
  description: Migrated update-join projection for silver.UpdateJoinTarget.
  columns:
  - name: ProductAlternateKey
    description: Business key derived from bronze.Product.ProductID.
    data_tests:
    - not_null
    - unique
  - name: EnglishProductName
    description: Product name projected from bronze.Product.ProductName.
  - name: LastSeenDate
    description: Refresh timestamp set during model execution.

unit_tests:
- name: test_insert_select_projects_source_row
  model: insertselecttarget
  given:
  - input: ref('stg_bronze__product')
    rows:
    - ProductID: 10
      ProductName: Touring-1000
  expect:
    rows:
    - ProductAlternateKey: "10"
      EnglishProductName: Touring-1000
- name: test_update_join_projects_source_row
  model: updatejointarget
  given:
  - input: ref('stg_bronze__product')
    rows:
    - ProductID: 101
      ProductName: Road-150 Red
  expect:
    rows:
    - ProductAlternateKey: "101"
      EnglishProductName: Road-150 Red
