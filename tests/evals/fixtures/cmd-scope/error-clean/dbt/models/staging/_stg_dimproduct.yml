version: 2

models:
  - name: stg_dimproduct
    description: "Staged product projection for silver.DimProduct."
    columns:
      - name: ProductAlternateKey
        description: "Business key derived from bronze.Product.ProductID."
        data_tests:
          - not_null
          - unique
      - name: EnglishProductName
        description: "Product name projected from bronze.Product.ProductName."
      - name: StandardCost
        description: "Standard cost projected from bronze.Product.StandardCost."
      - name: ListPrice
        description: "List price projected from bronze.Product.ListPrice."
      - name: Color
        description: "Product color with NULL values normalized to an empty string."
      - name: Size
        description: "Product size projected from bronze.Product.Size."
      - name: ProductLine
        description: "Product line code projected from bronze.Product.ProductLine."
      - name: Class
        description: "Product class code projected from bronze.Product.Class."
      - name: Style
        description: "Product style code projected from bronze.Product.Style."
      - name: StartDate
        description: "Start date projected from bronze.Product.SellStartDate."
      - name: EndDate
        description: "End date projected from bronze.Product.SellEndDate."
      - name: Status
        description: "Lifecycle status derived from DiscontinuedDate and SellEndDate."

unit_tests:
  - name: test_status_current_when_active_product
    model: stg_dimproduct
    given:
      - input: source('bronze', 'product')
        rows:
          - ProductID: 1
            ProductName: Road-150
            StandardCost: 10.0
            ListPrice: 25.0
            Color: Red
            Size: M
            ProductLine: R
            Class: H
            Style: U
            SellStartDate: "2024-01-01"
            SellEndDate: null
            DiscontinuedDate: null
    expect:
      rows:
        - ProductAlternateKey: "1"
          EnglishProductName: Road-150
          StandardCost: 10.0
          ListPrice: 25.0
          Color: Red
          Size: M
          ProductLine: R
          Class: H
          Style: U
          StartDate: "2024-01-01"
          EndDate: null
          Status: Current
  - name: test_status_obsolete_when_discontinued
    model: stg_dimproduct
    given:
      - input: source('bronze', 'product')
        rows:
          - ProductID: 2
            ProductName: Mountain-200
            StandardCost: 20.0
            ListPrice: 45.0
            Color: Blue
            Size: L
            ProductLine: M
            Class: M
            Style: U
            SellStartDate: "2024-02-01"
            SellEndDate: null
            DiscontinuedDate: "2024-03-15"
    expect:
      rows:
        - ProductAlternateKey: "2"
          EnglishProductName: Mountain-200
          StandardCost: 20.0
          ListPrice: 45.0
          Color: Blue
          Size: L
          ProductLine: M
          Class: M
          Style: U
          StartDate: "2024-02-01"
          EndDate: null
          Status: Obsolete
  - name: test_status_outdated_when_sell_end_present
    model: stg_dimproduct
    given:
      - input: source('bronze', 'product')
        rows:
          - ProductID: 3
            ProductName: Touring-300
            StandardCost: 15.0
            ListPrice: 30.0
            Color: Green
            Size: S
            ProductLine: T
            Class: L
            Style: W
            SellStartDate: "2023-05-01"
            SellEndDate: "2024-01-31"
            DiscontinuedDate: null
    expect:
      rows:
        - ProductAlternateKey: "3"
          EnglishProductName: Touring-300
          StandardCost: 15.0
          ListPrice: 30.0
          Color: Green
          Size: S
          ProductLine: T
          Class: L
          Style: W
          StartDate: "2023-05-01"
          EndDate: "2024-01-31"
          Status: Outdated
  - name: test_color_defaults_to_empty_string_when_null
    model: stg_dimproduct
    given:
      - input: source('bronze', 'product')
        rows:
          - ProductID: 4
            ProductName: Helmet-400
            StandardCost: 5.0
            ListPrice: 12.0
            Color: null
            Size: XS
            ProductLine: A
            Class: E
            Style: U
            SellStartDate: "2024-04-01"
            SellEndDate: null
            DiscontinuedDate: null
    expect:
      rows:
        - ProductAlternateKey: "4"
          EnglishProductName: Helmet-400
          StandardCost: 5.0
          ListPrice: 12.0
          Color: ""
          Size: XS
          ProductLine: A
          Class: E
          Style: U
          StartDate: "2024-04-01"
          EndDate: null
          Status: Current
  - name: test_empty_source_returns_no_rows
    model: stg_dimproduct
    given:
      - input: source('bronze', 'product')
        rows: []
    expect:
      rows: []
