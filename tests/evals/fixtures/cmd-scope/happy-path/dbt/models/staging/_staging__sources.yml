version: 2
sources:
- name: bronze
  schema: bronze
  tables:
  - name: product
    columns:
    - name: ProductID
      data_type: int
    - name: ProductName
      data_type: nvarchar(50)
    - name: ProductNumber
      data_type: nvarchar(25)
    - name: MakeFlag
      data_type: boolean
    - name: FinishedGoodsFlag
      data_type: boolean
    - name: Color
      data_type: nvarchar(15)
    - name: SafetyStockLevel
      data_type: smallint
    - name: ReorderPoint
      data_type: smallint
    - name: StandardCost
      data_type: double
    - name: ListPrice
      data_type: double
    - name: Size
      data_type: nvarchar(5)
    - name: SizeUnitMeasureCode
      data_type: nchar(3)
    - name: WeightUnitMeasureCode
      data_type: nchar(3)
    - name: Weight
      data_type: double
    - name: DaysToManufacture
      data_type: int
    - name: ProductLine
      data_type: nchar(2)
    - name: Class
      data_type: nchar(2)
    - name: Style
      data_type: nchar(2)
    - name: ProductSubcategoryID
      data_type: int
    - name: ProductModelID
      data_type: int
    - name: SellStartDate
      data_type: timestamp
    - name: SellEndDate
      data_type: timestamp
    - name: DiscontinuedDate
      data_type: timestamp
    - name: ModifiedDate
      data_type: timestamp
  - name: customer
