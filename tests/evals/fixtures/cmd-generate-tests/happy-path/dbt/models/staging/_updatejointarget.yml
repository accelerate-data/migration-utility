version: 2

models:
  - name: updatejointarget
    description: "Migrated from silver.usp_load_UpdateJoinTarget. Target: silver.UpdateJoinTarget."
    columns:
      - name: ProductAlternateKey
        description: "Business key derived from bronze.Product.ProductID cast to NVARCHAR(25)."
        data_tests:
          - unique
          - not_null
      - name: EnglishProductName
        description: "Product name projected from bronze.Product.ProductName."
      - name: LastSeenDate
        description: "Refresh timestamp set to current_timestamp() at load time."

unit_tests:
  - name: test_gap_cast_product_id_to_product_alternate_key
    model: updatejointarget
    given:
      - input: source('bronze', 'product')
        rows:
          - ProductID: 101
            ProductName: Road-150 Red
    expect:
      rows:
        - ProductAlternateKey: "101"
          EnglishProductName: Road-150 Red
  - name: test_gap_empty_source_returns_no_rows
    model: updatejointarget
    given:
      - input: source('bronze', 'product')
        rows: []
    expect:
      rows: []
  - name: test_gap_multiple_products_all_projected
    model: updatejointarget
    given:
      - input: source('bronze', 'product')
        rows:
          - ProductID: 1
            ProductName: Widget-A
          - ProductID: 2
            ProductName: Widget-B
    expect:
      rows:
        - ProductAlternateKey: "1"
          EnglishProductName: Widget-A
        - ProductAlternateKey: "2"
          EnglishProductName: Widget-B
