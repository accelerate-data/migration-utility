version: 2

models:
  - name: insertselecttarget
    description: >
      Dimension table for product inserts. Materializes a simple non-SCD dimension
      from stored procedure silver.usp_load_InsertSelectTarget.
    columns:
      - name: ProductAlternateKey
        description: The product alternate key (NVARCHAR(25))
        data_type: NVARCHAR(25)
        tests:
          - unique
          - not_null
      - name: EnglishProductName
        description: The product name
        data_type: NVARCHAR(50)
