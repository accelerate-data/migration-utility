migration_test:
  target: dev
  outputs:
    dev:
      type: sqlserver
      driver: "ODBC Driver 18 for SQL Server"
      server: "{{ env_var('MSSQL_HOST', 'localhost') }}"
      port: "{{ env_var('MSSQL_PORT', '1433') | int }}"
      database: "AdventureWorks2022"
      user: sa
      password: "{{ env_var('SA_PASSWORD') }}"
      schema: MigrationTest
      trust_cert: true
      threads: 4
