version: 2
models:
- name: stg_selectintotarget
  description: Staging table that loads product data from bronze.Product using SELECT
    INTO pattern. Provides a denormalized product dimension with alternate key and
    localized name.
  columns:
  - name: ProductAlternateKey
    data_type: nvarchar(25)
    description: Product identifier cast to string format, serves as natural primary
      key.
    tests:
    - unique
    - not_null
  - name: EnglishProductName
    data_type: nvarchar(50)
    description: Localized product name from the source Product table.
    tests:
    - not_null
  - name: _dbt_run_id
    data_type: text
    description: dbt invocation ID that identifies the execution run.
  - name: _loaded_at
    data_type: timestamp
    description: Timestamp when the record was loaded into the staging table.
  unit_tests:
  - name: test_selectinto_rows_present_populates_target
    model: stg_selectintotarget
    given:
    - input: source('[bronze]', '[Product]')
      rows:
      - ProductName: Mountain Bike
        ProductNumber: MB-001
        MakeFlag: 1
        FinishedGoodsFlag: 1
        SafetyStockLevel: 100
        ReorderPoint: 50
        StandardCost: 200.0
        ListPrice: 499.99
        DaysToManufacture: 4
        SellStartDate: '2020-01-01'
        ModifiedDate: '2023-06-01'
  - name: test_selectinto_empty_source_no_rows
    model: stg_selectintotarget
    given:
    - input: source('[bronze]', '[Product]')
      rows: []
