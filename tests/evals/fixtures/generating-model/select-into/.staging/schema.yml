version: 2
models:
- name: select_into_target
  description: Dimension table containing product information populated via SELECT INTO from bronze.Product
  columns:
  - name: ProductAlternateKey
    description: NVARCHAR(25) product key, cast from ProductID
    data_type: string
    tests:
    - unique
    - not_null
  - name: EnglishProductName
    description: NVARCHAR(50) product name
    data_type: string
  unit_tests:
  - name: test_selectinto_rows_present_populates_target
    model: select_into_target
    given:
    - input: source('[bronze]', '[Product]')
      rows:
      - ProductName: Mountain Bike
        ProductNumber: MB-001
        MakeFlag: 1
        FinishedGoodsFlag: 1
        SafetyStockLevel: 100
        ReorderPoint: 50
        StandardCost: 200.0
        ListPrice: 499.99
        DaysToManufacture: 4
        SellStartDate: '2020-01-01'
        ModifiedDate: '2023-06-01'
  - name: test_selectinto_empty_source_no_rows
    model: select_into_target
    given:
    - input: source('[bronze]', '[Product]')
      rows: []
