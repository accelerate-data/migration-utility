version: 2
models:
- name: stg_dimcustomerfromview
  description: Dimension table with active customer names
  columns:
  - name: CustomerID
    description: Unique customer identifier
    data_tests:
    - unique
    - not_null
  - name: FullName
    description: Concatenated first and last name
    data_tests:
    - not_null
  unit_tests:
  - name: test_project_active_customer_name
    model: stg_dimcustomerfromview
    given:
    - input: source('[silver]', '[vw_activecustomers]')
      rows:
      - CustomerID: 1
        FirstName: Ada
        LastName: Lovelace
    expect:
      rows:
      - CustomerID: 1
        FullName: Ada Lovelace
- name: dim_customer_from_view
  description: Dimension table projecting full names from active customers
  columns:
  - name: CustomerID
    description: Unique customer identifier
    data_tests:
    - unique
    - not_null
  - name: FullName
    description: Concatenated first and last name
    data_tests:
    - not_null
  unit_tests:
  - name: test_project_active_customer_name
    model: dim_customer_from_view
    given:
    - input: ref('stg_vw_activecustomers')
      rows:
      - CustomerID: 1
        FirstName: Ada
        LastName: Lovelace
    expect:
      rows:
      - CustomerID: 1
        FullName: Ada Lovelace
