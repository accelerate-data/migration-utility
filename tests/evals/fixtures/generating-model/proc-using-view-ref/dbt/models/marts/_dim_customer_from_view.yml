version: 2
models:
- name: dim_customer_from_view
  description: Dimension table of active customers with full names, projected from
    the active customers view.
  columns:
  - name: CustomerID
    description: Unique identifier for the customer.
    data_tests:
    - unique
    - not_null
  - name: FullName
    description: Full name of the customer (concatenated from FirstName and LastName).
    data_tests:
    - not_null
  unit_tests:
  - name: test_project_active_customer_name
    model: dim_customer_from_view
    given:
    - input: source('[silver]', '[vw_activecustomers]')
      rows:
      - CustomerID: 1
        FirstName: Ada
        LastName: Lovelace
    expect:
      rows:
      - CustomerID: 1
        FullName: Ada Lovelace
