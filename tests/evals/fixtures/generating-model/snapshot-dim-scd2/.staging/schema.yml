version: 2

models:
  - name: stg_employee
    description: "Staging model for bronze.employee source table."

snapshots:
  - name: dimemployeescd2_snapshot
    description: "Migrated from silver.usp_load_DimEmployeeSCD2. Target: silver.DimEmployeeSCD2."
    columns:
      - name: EmployeeNaturalKey
        description: "Employee natural key (NationalIDNumber)"
        data_tests:
          - unique
          - not_null
      - name: FirstName
        description: "Employee first name derived from LoginID"
      - name: LastName
        description: "Employee last name (from JobTitle)"
      - name: JobTitle
        description: "Employee job title"
        data_tests:
          - not_null
      - name: Department
        description: "Employee department (from MaritalStatus)"
