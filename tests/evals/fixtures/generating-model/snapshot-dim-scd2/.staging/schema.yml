version: 2
models:
- name: stg_employee
  description: Staging model for bronze.employee source table.
- name: dim_employee_scd2
  unit_tests:
  - name: test_expire_changed_row
    model: dim_employee_scd2
    given:
    - input: source('[bronze]', '[Employee]')
      rows:
      - NationalIDNumber: '123456789'
        LoginID: adventure-works\ken0
        JobTitle: Engineer
        MaritalStatus: S
    expect:
      rows:
      - EmployeeNaturalKey: '123456789'
        JobTitle: Engineer
  - name: test_insert_new_employee
    model: dim_employee_scd2
    given:
    - input: source('[bronze]', '[Employee]')
      rows:
      - NationalIDNumber: '987654321'
        LoginID: adventure-works\jane0
        JobTitle: Manager
        MaritalStatus: M
    expect:
      rows:
      - EmployeeNaturalKey: '987654321'
        JobTitle: Manager
snapshots:
- name: dimemployeescd2_snapshot
  description: 'Migrated from silver.usp_load_DimEmployeeSCD2. Target: silver.DimEmployeeSCD2.'
  columns:
  - name: EmployeeNaturalKey
    description: Employee natural key (NationalIDNumber)
    data_tests:
    - unique
    - not_null
  - name: FirstName
    description: Employee first name derived from LoginID
  - name: LastName
    description: Employee last name (from JobTitle)
  - name: JobTitle
    description: Employee job title
    data_tests:
    - not_null
  - name: Department
    description: Employee department (from MaritalStatus)
