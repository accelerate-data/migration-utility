version: 2

models:
  - name: selectintotarget
    description: "Projected mart model for silver.SelectIntoTarget."
    columns:
      - name: ProductAlternateKey
        description: "Business key derived from bronze.Product.ProductID."
        data_tests:
          - not_null
          - unique
      - name: EnglishProductName
        description: "Product name projected from bronze.Product.ProductName."
      - name: _dbt_run_id
        description: "dbt invocation identifier for the run that produced this row."
      - name: _loaded_at
        description: "Timestamp when the row was loaded by dbt."

unit_tests:
  - name: test_selectinto_rows_present_populates_target
    model: selectintotarget
    given:
      - input: ref('stg_bronze__product')
        rows:
          - ProductID: 101
            ProductName: Mountain Bike
    expect:
      rows:
        - ProductAlternateKey: "101"
          EnglishProductName: Mountain Bike
  - name: test_selectinto_empty_source_no_rows
    model: selectintotarget
    given:
      - input: ref('stg_bronze__product')
        rows: []
    expect:
      rows: []
