version: 2

models:
  - name: updatejointarget
    description: "Migrated from silver.usp_load_UpdateJoinTarget. Target: silver.UpdateJoinTarget."
    columns:
      - name: ProductAlternateKey
        description: "Business key derived from bronze.Product.ProductID cast to NVARCHAR(25)."
        data_tests:
          - unique
          - not_null
      - name: EnglishProductName
        description: "Product name projected from bronze.Product.ProductName."
      - name: LastSeenDate
        description: "Refresh timestamp set to current_timestamp() at load time."
      - name: _dbt_run_id
        description: "dbt invocation identifier for the run that produced this row."
      - name: _loaded_at
        description: "Timestamp when the row was loaded by dbt."

unit_tests:
  - name: test_update_matched_row
    model: updatejointarget
    given:
      - input: ref('stg_bronze__product')
        rows:
          - ProductID: 1
            ProductName: Road-150-Updated
    expect:
      rows:
        - ProductAlternateKey: "1"
          EnglishProductName: Road-150-Updated
