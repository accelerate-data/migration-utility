# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "oracle regression — per-command pipeline coverage against SH schema fixtures"

prompts:
  - id: cmd-scope
    label: cmd-scope
    raw: file://../prompts/cmd-scope.txt
  - id: cmd-profile
    label: cmd-profile
    raw: file://../prompts/cmd-profile.txt
  - id: cmd-generate-model
    label: cmd-generate-model
    raw: file://../prompts/cmd-generate-model.txt
  - id: cmd-generate-tests
    label: cmd-generate-tests
    raw: file://../prompts/cmd-generate-tests.txt
  - id: cmd-refactor
    label: cmd-refactor
    raw: file://../prompts/cmd-refactor.txt

extensions:
  - file://../scripts/run-workspace-extension.js:extensionHook

providers:
  - file://../providers/sonnet-120.yaml

defaultTest:
  vars:
    fixture_path: "tests/evals/oracle-regression/fixtures"
  assert:
    - type: javascript
      value: file://../assertions/check-command-summary.js

tests:
  # ── scope ────────────────────────────────────────────────────────────────────
  # Verifies that the scope command resolves the writer for SH.CHANNEL_SALES_SUMMARY
  # using Oracle catalog conventions (uppercase identifiers, oracle dialect).
  - description: "oracle — scope — CHANNEL_SALES_SUMMARY resolves to SUMMARIZE_CHANNEL_SALES"
    prompts: ["cmd-scope"]
    vars:
      target_tables: "sh.CHANNEL_SALES_SUMMARY"
      target_table: "sh.channel_sales_summary"
      target_procedure: "sh.summarize_channel_sales"
      expected_item_statuses: '{"sh.CHANNEL_SALES_SUMMARY": "resolved"}'
      expected_status: "resolved"
      expected_writer: "summarize_channel_sales"
      expected_output_terms: "resolved"
    assert:
      - type: javascript
        value: file://../assertions/check-table-scoping.js
      - type: javascript
        value: file://../assertions/check-procedure-catalog.js

  # ── profile ──────────────────────────────────────────────────────────────────
  # Verifies that the profile command produces a valid profile for an Oracle target
  # table. Pre-committed scoping section allows the guard to pass without running scope.
  - description: "oracle — profile — CHANNEL_SALES_SUMMARY profiles as fact_transaction"
    prompts: ["cmd-profile"]
    vars:
      target_tables: "sh.CHANNEL_SALES_SUMMARY"
      target_table: "sh.channel_sales_summary"
      expected_item_statuses: '{"sh.CHANNEL_SALES_SUMMARY": "ok"}'
      expected_status: "ok"
      expected_output_terms: "ok"
    assert:
      - type: javascript
        value: file://../assertions/check-table-profile.js

  # ── generate-model ───────────────────────────────────────────────────────────
  # Verifies that the generate-model command produces a valid dbt model from the
  # refactored CTE SQL in the pre-committed catalog. Pre-committed scoping, profile,
  # and refactor sections allow all guards to pass.
  - description: "oracle — generate-model — CHANNEL_SALES_SUMMARY generates CTE dbt model"
    prompts: ["cmd-generate-model"]
    vars:
      target_tables: "sh.CHANNEL_SALES_SUMMARY"
      target_table: "sh.channel_sales_summary"
      expected_item_statuses: '{"sh.CHANNEL_SALES_SUMMARY": "ok"}'
      expected_model_terms: "with,select,channel_id,channel_desc"
      expected_output_terms: "ok"
    assert:
      - type: javascript
        value: file://../assertions/check-dbt-model.js

  # ── generate-tests ───────────────────────────────────────────────────────────
  # Verifies that the generate-tests command enumerates branches from the PL/SQL
  # procedure body covering all 5 patterns: INSERT+CTE, MERGE, IF/ELSIF, EXCEPTION.
  # Pre-committed scoping and profile sections allow guards to pass.
  - description: "oracle — generate-tests — SUMMARIZE_CHANNEL_SALES enumerates PL/SQL branches"
    prompts: ["cmd-generate-tests"]
    vars:
      target_tables: "sh.CHANNEL_SALES_SUMMARY"
      target_table: "sh.channel_sales_summary"
      writer: "sh.summarize_channel_sales"
      expected_item_statuses: '{"sh.CHANNEL_SALES_SUMMARY": "ok"}'
      expected_status: "ok,partial"
      expected_coverage: "complete,partial"
      min_branch_count: 3
      expected_output_terms: "ok"
    assert:
      - type: javascript
        value: file://../assertions/check-test-spec.js

  # ── refactor ─────────────────────────────────────────────────────────────────
  # Verifies that the refactor command restructures the INSERT+CTE body into dbt
  # import/logical/final CTE form. Pre-committed scoping and profile sections allow
  # guards to pass.
  - description: "oracle — refactor — CHANNEL_SALES_SUMMARY CTE restructured with final"
    prompts: ["cmd-refactor"]
    vars:
      target_tables: "sh.CHANNEL_SALES_SUMMARY"
      target_table: "sh.channel_sales_summary"
      expected_item_statuses: '{"sh.CHANNEL_SALES_SUMMARY": "ok"}'
      expected_extracted_terms: "channel_totals,amount_sold"
      expected_refactored_terms: "with,final"
      expected_output_terms: "ok"
    assert:
      - type: javascript
        value: file://../assertions/check-refactored-sql.js
