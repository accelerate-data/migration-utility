# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "mssql live — setup-ddl extract + scope + profile against Docker SQL Server"

prompts:
  - id: cmd-live-pipeline
    label: cmd-live-pipeline
    raw: file://../prompts/cmd-live-pipeline.txt

extensions:
  - file://../scripts/run-workspace-extension.js:extensionHook

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 120
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/mssql-live/fixtures"
  assert:
    - type: javascript
      value: file://../assertions/check-command-summary.js

tests:
  - description: "mssql live — FactInternetSales: extract → scope → profile"
    prompts: ["cmd-live-pipeline"]
    vars:
      target_tables: "MigrationTest.silver_factinternetsales"
      target_table: "MigrationTest.silver_factinternetsales"
      extract_flags: "--database AdventureWorks2022 --schemas MigrationTest"
      db_env_setup: "export MSSQL_HOST=localhost"
      expected_item_statuses: '{"MigrationTest.silver_factinternetsales": "resolved"}'
      expected_status: "resolved"
      expected_writer: "usp_stage_factinternetsales"
      expected_output_terms: "resolved"
    assert:
      - type: javascript
        value: file://../assertions/check-table-scoping.js
