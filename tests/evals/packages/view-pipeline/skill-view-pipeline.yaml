# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "View pipeline — analyzing-table and profiling-table skill coverage for views"

prompts:
  - id: analyzing-table-view
    label: analyzing-table-view
    raw: file://../../prompts/skill-analyzing-table-view.txt
  - id: profiling-table-view
    label: profiling-table-view
    raw: file://../../prompts/skill-profiling-table-view.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 40
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
  assert:
    - type: javascript
      value: file://../../assertions/check-view-catalog.js

tests:
  # ── analyzing-table: view scoping path ───────────────────────

  # single-table pass-through SELECT * with column list
  - description: "analyzing-table — view-passthrough — vDimSalesTerritory single-table select"
    prompts: ["analyzing-table-view"]
    vars:
      target_view: "silver.vDimSalesTerritory"
      check_type: "scoping"

  # multi-column pass-through on DimPromotion
  - description: "analyzing-table — view-passthrough — vw_DimPromotion multi-column select"
    prompts: ["analyzing-table-view"]
    vars:
      target_view: "silver.vw_DimPromotion"
      check_type: "scoping"

  # ── profiling-table: view profile path ───────────────────────

  # single-source, no aggregation → stg
  - description: "profiling-table — view-stg — vw_currency_ref single-source no-agg classifies as stg"
    prompts: ["profiling-table-view"]
    vars:
      target_view: "silver.vw_currency_ref"
      check_type: "profile"
      expected_classification: "stg"
