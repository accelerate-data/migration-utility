# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Refactoring-sql skill — CTE restructuring with equivalence audit"

prompts:
  - id: refactoring-sql
    label: refactoring-sql
    raw: file://../../prompts/skill-refactoring-sql.txt
  - id: refactoring-sql-view
    label: refactoring-sql-view
    raw: file://../../prompts/skill-refactoring-sql-view.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

providers:
  - file://../../providers/haiku-120.yaml

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-refactored-sql.js

tests:
  # ── insert-select ─────────────────────────────────────────────
  - description: "insert-select — simple INSERT...SELECT extracted and refactored"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/insert-select"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_extracted_terms: "select"
      expected_refactored_terms: "with,final"

  # ── merge ─────────────────────────────────────────────────────
  - description: "merge — MERGE USING clause extracted, refactored with import CTEs"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/merge"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      expected_extracted_terms: "productalternatekey,isnull"
      expected_refactored_terms: "with,final,isnull"

  # ── update with join ──────────────────────────────────────────
  - description: "update-join — UPDATE with JOIN extracted as joined SELECT"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/update-join"
      target_table: "silver.UpdateJoinTarget"
      writer: "silver.usp_load_UpdateJoinTarget"
      expected_extracted_terms: "productname,englishproductname"
      expected_refactored_terms: "with,final"

  # ── delete with where ─────────────────────────────────────────
  - description: "delete-where — DELETE inverted to keep-rows SELECT"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/delete-where"
      target_table: "silver.DeleteWhereTarget"
      writer: "silver.usp_load_DeleteWhereTarget"
      expected_extracted_terms: "isretired"
      expected_refactored_terms: "with,final,isretired"

  # ── truncate + insert with outer apply (full reload) ─────────
  - description: "truncate-insert — DimCustomer full reload extracted with OUTER APPLY"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/truncate-insert"
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      expected_extracted_terms: "customeralternatekey,firstname,min("
      expected_refactored_terms: "with,final"

  # ── union all ─────────────────────────────────────────────────
  - description: "union-all — UNION ALL preserved in both extracted and refactored"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/union-all"
      target_table: "silver.UnionAllTarget"
      writer: "silver.usp_load_UnionAllTarget"
      expected_extracted_terms: "union all"
      expected_refactored_terms: "with,union all,final"

  # ── window-fn ────────────────────────────────────────────────
  - description: "window-fn — FactInternetSales window expressions preserved"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/window-fn"
      target_table: "silver.FactInternetSales"
      writer: "silver.usp_stage_FactInternetSales"
      expected_extracted_terms: "count(*) over,partition by"
      expected_refactored_terms: "with,count(*) over,partition by"

  # ── grouping sets ─────────────────────────────────────────────
  - description: "grouping-sets — GROUPING SETS preserved in refactored CTEs"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/grouping-sets"
      target_table: "silver.GroupingSetsTarget"
      writer: "silver.usp_load_GroupingSetsTarget"
      expected_extracted_terms: "grouping sets"
      expected_refactored_terms: "with,grouping sets"

  # ── pivot ─────────────────────────────────────────────────────
  - description: "pivot — PIVOT pattern handled in CTE restructuring"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/pivot"
      target_table: "silver.PivotTarget"
      writer: "silver.usp_load_PivotTarget"
      expected_refactored_terms: "with,final"

  # --- VU-878: additional pattern coverage ---

  # ── select into ──────────────────────────────────────────────
  - description: "select-into — SELECT INTO extracted as pure SELECT with CTE"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/select-into"
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      expected_extracted_terms: "productalternatekey"
      expected_refactored_terms: "with,final"

  # ── single cte ───────────────────────────────────────────────
  - description: "single-cte — CTE-based INSERT restructured into import/logical/final"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/single-cte"
      target_table: "silver.SingleCteTarget"
      writer: "silver.usp_load_SingleCteTarget"
      expected_refactored_terms: "with,final"

  # ── correlated subquery (multi-level CTE) ────────────────────
  - description: "correlated-subquery — correlated subquery flattened into CTE chain"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/correlated-subquery"
      target_table: "silver.CorrelatedSubqueryTarget"
      writer: "silver.usp_load_CorrelatedSubqueryTarget"
      expected_refactored_terms: "with,final"

  # ── case when (via MERGE) ────────────────────────────────────
  - description: "case-when — CASE WHEN expressions preserved in refactored CTEs"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/case-when"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      expected_extracted_terms: "case,when,obsolete"
      expected_refactored_terms: "with,case,when,final"

  # ── outer-apply ──────────────────────────────────────────────
  - description: "outer-apply — OUTER APPLY and JOIN restructured into CTEs"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/outer-apply"
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      expected_extracted_terms: "firstname,min("
      expected_refactored_terms: "with,join,final"

  # ── insert-select-derived ────────────────────────────────────
  - description: "insert-select-derived — FactInternetSales staging query derived table"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/insert-select-derived"
      target_table: "silver.FactInternetSales"
      writer: "silver.usp_stage_FactInternetSales"
      expected_refactored_terms: "with,final"

  # ── update-join-cte ──────────────────────────────────────────
  - description: "update-join-cte — UpdateJoinTarget CTE restructuring"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/update-join-cte"
      target_table: "silver.UpdateJoinTarget"
      writer: "silver.usp_load_UpdateJoinTarget"
      expected_refactored_terms: "with,join,final"

  # ── delete-where-cte ─────────────────────────────────────────
  - description: "delete-where-cte — DeleteWhereTarget CTE restructuring"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/delete-where-cte"
      target_table: "silver.DeleteWhereTarget"
      writer: "silver.usp_load_DeleteWhereTarget"
      expected_refactored_terms: "with,final"

  # ── if/else control flow ─────────────────────────────────────
  - description: "if-else — IF/ELSE branches decomposed into CTE structure"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/if-else"
      target_table: "silver.IfElseTarget"
      writer: "silver.usp_load_IfElseTarget"
      expected_refactored_terms: "with,final"

  # ── while loop ───────────────────────────────────────────────
  - description: "while-loop — WHILE loop set-based equivalent in CTEs"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/while-loop"
      target_table: "silver.WhileLoopTarget"
      writer: "silver.usp_load_WhileLoopTarget"
      expected_refactored_terms: "with,final"

  # ── cross-db exec (graceful) ─────────────────────────────────
  - description: "cross-db-exec — cross-database EXEC graceful partial"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/cross-db-exec"
      target_table: "silver.DimCrossDbProfile"
      writer: "silver.usp_load_DimCrossDbProfile"
      graceful_partial: "true"

  # ── dynamic-sql (graceful) ───────────────────────────────────
  - description: "dynamic-sql — dynamic SQL graceful partial"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/dynamic-sql"
      target_table: "silver.DimCurrency"
      writer: "silver.usp_load_DimCurrency"
      graceful_partial: "true"

  # ── exec variable (graceful) ─────────────────────────────────
  - description: "exec-variable — EXEC(@sql) graceful partial"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/exec-variable"
      target_table: "silver.ExecVariableTarget"
      writer: "silver.usp_scope_ExecVariable"
      graceful_partial: "true"

  # ── exec concat (graceful) ──────────────────────────────────
  - description: "exec-concat — EXEC concatenation graceful partial"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/exec-concat"
      target_table: "silver.ExecConcatTarget"
      writer: "silver.usp_scope_ExecConcat"
      graceful_partial: "true"

  # ── delete top ───────────────────────────────────────────────
  - description: "delete-top — DELETE TOP inverted to keep-rows SELECT"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/delete-top"
      target_table: "silver.DeleteTopTarget"
      writer: "silver.usp_load_DeleteTopTarget"
      expected_extracted_terms: "loadeddate,dateadd"
      expected_refactored_terms: "with,final"

  # ── recursive cte ────────────────────────────────────────────
  - description: "recursive-cte — recursive CTE preserved in refactored model"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/recursive-cte"
      target_table: "silver.RecursiveCteTarget"
      writer: "silver.usp_load_RecursiveCteTarget"
      expected_extracted_terms: "union all,managerid"
      expected_refactored_terms: "with,union all,final"

  # ── try/catch ────────────────────────────────────────────────
  - description: "try-catch — TRY block INSERT extracted, CATCH discarded"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/try-catch"
      target_table: "silver.TryCatchTarget"
      writer: "silver.usp_load_TryCatchTarget"
      expected_extracted_terms: "productalternatekey"
      expected_refactored_terms: "with,final"

  # ── nested-flow ──────────────────────────────────────────────
  - description: "nested-flow — nested IF/TRY decomposed into CTE structure"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/nested-flow"
      target_table: "silver.NestedFlowTarget"
      writer: "silver.usp_load_NestedFlowTarget"
      expected_refactored_terms: "with,final"

  # ── dbt-aware staging reuse ─────────────────────────────────
  - description: "dbt-aware-model-reuse — existing dimproduct.sql influences import CTE column names"
    prompts: ["refactoring-sql"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/merge"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      stg_model_file: "dimproduct.sql"
      expected_stg_columns: "productalternatekey,englishproductname,standardcost,listprice"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-aware-refactored-sql.js

  # ── view refactor ────────────────────────────────────────────
  - description: "view-basic — single-source filtered view restructured into CTEs"
    prompts: ["refactoring-sql-view"]
    vars:
      fixture_path: "tests/evals/fixtures/refactoring-sql/view-active-customers"
      target_view: "silver.vw_active_customers"
      expected_extracted_terms: "customerid,isactive"
      expected_refactored_terms: "with,final,customerid"
