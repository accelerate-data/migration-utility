# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Profile skill — LLM profiling of tables for migration"

prompts:
  - id: profiling-table
    label: profiling-table
    raw: file://../../prompts/skill-profiling-table.txt
  - id: profiling-table-view
    label: profiling-table-view
    raw: file://../../prompts/skill-profiling-table-view.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

providers:
  - file://../../providers/haiku-60.yaml

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-table-profile.js

tests:
  # ── classification-fact-transaction — FactInternetSales rich catalog signals
  - description: "classification-fact-transaction — FactInternetSales rich catalog signals"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/classification-fact-transaction"
      target_table: "silver.FactInternetSales"
      writer: "silver.usp_stage_FactInternetSales"

  # ── truncate-insert dim: DimCustomer full-load pattern ────────
  - description: "truncate-insert — DimCustomer full-load"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/truncate-insert"
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      expected_kind: "dim_non_scd"
      expected_status: "ok"

  # ── merge — DimProduct MERGE writer ──────────────────────────
  - description: "merge — DimProduct MERGE writer"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/merge"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"

  # ── exec-chain — FactExecProfile helper proc context ────────
  - description: "exec-chain — FactExecProfile helper proc context"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/exec-chain"
      target_table: "silver.FactExecProfile"
      writer: "silver.usp_load_FactExecProfile"
      expected_kind: "fact_transaction"
      expected_status: "ok"

  # ── cross-db exec reports partial limitation ──────────────────
  - description: "cross-db-exec — DimCrossDbProfile stays partial with limitation"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/cross-db-exec"
      target_table: "silver.DimCrossDbProfile"
      writer: "silver.usp_load_DimCrossDbProfile"
      expected_status: "ok,partial"
      expected_warning_codes: "PARTIAL_PROFILE"

  # ── dynamic-sql — DimCurrency sp_executesql partial ─────────
  - description: "dynamic-sql — DimCurrency sp_executesql partial"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/dynamic-sql"
      target_table: "silver.DimCurrency"
      writer: "silver.usp_load_DimCurrency"
      expected_status: "ok,partial"
      expected_warning_codes: "PARSE_ERROR"

  # ── classification-dim-scd2 — DimEmployeeSCD2 expire-and-insert
  - description: "classification-dim-scd2 — DimEmployeeSCD2 expire-and-insert"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/classification-dim-scd2"
      target_table: "silver.DimEmployeeSCD2"
      writer: "silver.usp_load_DimEmployeeSCD2"
      expected_kind: "dim_scd2"
      expected_status: "ok"

  # ── classification-fact-periodic-snapshot — FactInventorySnapshot daily
  - description: "classification-fact-periodic-snapshot — FactInventorySnapshot daily"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/classification-fact-periodic-snapshot"
      target_table: "silver.FactInventorySnapshot"
      writer: "silver.usp_load_FactInventorySnapshot"
      expected_kind: "fact_periodic_snapshot"
      expected_status: "ok"
      expected_watermark_column: "SnapshotDate"

  # ── pii — DimContact identifies sensitive columns ──────────
  - description: "pii — DimContact identifies sensitive columns"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/pii"
      target_table: "silver.DimContact"
      writer: "silver.usp_load_DimContact"
      expected_kind: "dim_non_scd"
      expected_status: "ok"
      expected_pii_columns: "EmailAddress,PhoneNumber,SocialSecurityNumber,BirthDate"

  # ── classification-fact-accumulating-snapshot — FactOrderFulfillment milestones
  - description: "classification-fact-accumulating-snapshot — FactOrderFulfillment milestones"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/classification-fact-accumulating-snapshot"
      target_table: "silver.FactOrderFulfillment"
      writer: "silver.usp_load_FactOrderFulfillment"
      expected_kind: "fact_accumulating_snapshot"
      expected_status: "ok"

  # ── fk-role-playing — FactResellerSales 3 date keys to DimDate
  - description: "fk-role-playing — FactResellerSales 3 date keys to DimDate"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/fk-role-playing"
      target_table: "silver.FactResellerSales"
      writer: "silver.usp_load_FactResellerSales"
      expected_kind: "fact_transaction"
      expected_status: "ok"
      expected_fk_type: "role_playing"

  # ── watermark-where — FactProductSalesDelta incremental load
  - description: "watermark-where — FactProductSalesDelta incremental load"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/watermark-where"
      target_table: "silver.FactProductSalesDelta"
      writer: "silver.usp_load_FactProductSalesDelta"
      expected_kind: "fact_transaction"
      expected_status: "ok"
      expected_watermark_column: "ModifiedDate"

  # ── classification-dim-junk — DimSalesFlags flag combinations
  - description: "classification-dim-junk — DimSalesFlags flag combinations"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/classification-dim-junk"
      target_table: "silver.DimSalesFlags"
      writer: "silver.usp_load_DimSalesFlags"
      expected_kind: "dim_junk"
      expected_status: "ok"

  # ── view profiling scenarios ───────────────────────────────

  # single-source, no aggregation → stg
  - description: "view-profile-stg — vw_currency_ref single-source no-agg"
    prompts: ["profiling-table-view"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/view-profile-stg"
      target_view: "silver.vw_currency_ref"
      check_type: "profile"
      expected_classification: "stg"
    assert:
      - type: javascript
        value: file://../../assertions/check-view-catalog.js

  # aggregation + group_by → mart
  - description: "view-profile-mart — vw_daily_sales_summary aggregation"
    prompts: ["profiling-table-view"]
    vars:
      fixture_path: "tests/evals/fixtures/profiling-table/view-profile-mart"
      target_view: "silver.vw_daily_sales_summary"
      check_type: "profile"
      expected_classification: "mart"
    assert:
      - type: javascript
        value: file://../../assertions/check-view-catalog.js
