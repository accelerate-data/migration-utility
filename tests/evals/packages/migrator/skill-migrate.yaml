description: "Migrate skill — dbt model generation from stored procedures"

prompts:
  - file://../../prompts/skill-migrate.txt

providers:
  - id: exec:claude-headless
    config:
      command: |
        claude -p \
          --output-format json \
          --allowedTools "Read,Write,Bash" \
          --max-turns 30 \
          --dangerously-skip-permissions \
          "{{prompt}}"
      timeout: 300000

defaultTest:
  vars:
    fixture_path: "{{FIXTURE_PATH | default('tests/evals/fixtures/migration-test')}}"

tests:
  # ── simple INSERT → table materialization ─────────────────────
  - description: "simple-insert-table — DimProduct MERGE → dbt model"
    vars:
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
    assert:
      - type: contains
        value: "{{ config("
      - type: contains
        value: "select * from final"
      - type: contains
        value: "migrate context"
      - type: contains
        value: "migrate write"
      # TODO: assert specific materialization once fixture with profile is available

