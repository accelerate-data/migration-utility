# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Migrator agent — batch dbt model generation from MigrationTest"

prompts:
  - file://../../prompts/agent-migrator.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 30
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
  options:
    transform: "(output.match(/\\{[\\s\\S]*\"schema_version\"[\\s\\S]*\"summary\"[\\s\\S]*\\}/) || [output])[0]"
  assert:
    - type: contains-json

tests:
  # ── simple INSERT → table materialization ─────────────────────
  - description: "simple-insert-table — DimProduct"
    vars:
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      scenario_id: "simple-insert"
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.results && d.results[0] &&
            (d.results[0].status === 'ok' || d.results[0].status === 'partial');
      - type: javascript
        value: "JSON.parse(output).summary.error === 0"
      # TODO: assert materialization and artifact paths once fixture with profile is available

  # ── incremental with watermark ────────────────────────────────
  # TODO: requires fixture with watermark profile populated

  # ── snapshot SCD2 ─────────────────────────────────────────────
  # TODO: requires SCD2 fixture

  # ── MERGE → incremental ──────────────────────────────────────
  # TODO: requires MERGE fixture with incremental profile
