# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "reset-migration command — pre-model stage and global reset orchestration"

prompts:
  - id: cmd-reset-migration
    label: cmd-reset-migration
    raw: file://../../prompts/cmd-reset-migration.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

providers:
  - file://../../providers/haiku-60.yaml

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-command-summary.js

tests:
  - description: "scope — reset clears scope and downstream pre-model state"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-reset-migration/base"
      instruction: "Run `/reset-migration scope silver.DimCustomer`."
      expected_item_statuses: '{"silver.DimCustomer": "reset"}'
      expected_output_terms: "reset-migration,dimcustomer,reset,scope"

  - description: "profile — reset clears profile and downstream pre-model state"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-reset-migration/base"
      instruction: "Run `/reset-migration profile silver.DimCustomer`."
      expected_item_statuses: '{"silver.DimCustomer": "reset"}'
      expected_output_terms: "reset-migration,dimcustomer,reset,profile"

  - description: "generate-tests — reset clears test generation state"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-reset-migration/base"
      instruction: "Run `/reset-migration generate-tests silver.DimCustomer`."
      expected_item_statuses: '{"silver.DimCustomer": "reset"}'
      expected_output_terms: "reset-migration,dimcustomer,reset,generate-tests"

  - description: "refactor — reset clears refactor state only"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-reset-migration/base"
      instruction: "Run `/reset-migration refactor silver.DimCustomer`."
      expected_item_statuses: '{"silver.DimCustomer": "reset"}'
      expected_output_terms: "reset-migration,dimcustomer,reset,refactor"

  - description: "idempotent — second reset is reported as no-op"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-reset-migration/base"
      instruction: "Run `/reset-migration refactor silver.DimCustomer` twice in sequence and report the final result."
      expected_item_statuses: '{"silver.DimCustomer": "noop"}'
      expected_output_terms: "reset-migration,dimcustomer,noop,refactor"

  - description: "blocked — refuse when model generation is already complete"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-reset-migration/model-complete"
      instruction: "Run `/reset-migration profile silver.DimCustomer`."
      expected_item_statuses: '{"silver.DimCustomer": "blocked"}'
      expected_output_terms: "reset-migration,dimcustomer,blocked,model"

  - description: "all — global reset inventories and removes existing artifacts"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-reset-migration/global-full"
      instruction: "Run `/reset-migration all`."
      expected_output_terms: "reset-migration,all,deleted paths,missing paths,cleared manifest sections"

  - description: "all — global reset reports already-absent paths"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-reset-migration/global-sparse"
      instruction: "Run `/reset-migration all`."
      expected_output_terms: "reset-migration,all,deleted paths,missing paths,cleared manifest sections"
