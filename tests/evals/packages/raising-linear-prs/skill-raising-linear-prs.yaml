# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Raising-linear-prs skill — verification, AC checkoff, PR creation, and In Review transition"

prompts:
  - id: raising-linear-prs
    label: raising-linear-prs
    raw: file://../../prompts/skill-raising-linear-prs.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 20
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-linear-skill-contract.js

tests:
  - description: "raise-pr — runs PR phase without plan mode and moves issue to In Review"
    vars:
      expect_enters_plan_mode: "false"
      expect_creates_pr: "true"
      expect_checks_off_acceptance_criteria: "true"
      expect_moves_issue_to_in_review: "true"
      expect_merges_pr: "false"
      required_terms: "rebase,review,acceptance"
