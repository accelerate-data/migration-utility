# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Applying-staging-candidate skill -- candidate-scoped staging execution"

prompts:
  - id: applying-staging-candidate
    label: applying-staging-candidate
    raw: file://../../prompts/skill-applying-staging-candidate.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

providers:
  - file://../../providers/haiku-120.yaml

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-refactor-mart-stg-execution.js

tests:
  - description: "[smoke] happy path -- one staging candidate rewires multiple consumers"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-refactor-mart/stg-happy-path"
      plan_file: "docs/design/refactor-mart-stg-happy-path.md"
      candidate_id: "STG-001"
      expected_candidate_statuses: "STG-001:applied,INT-001:planned,MART-001:planned"
      expected_output_terms: "applied,stg_bronze__orders,int_sales_orders,int_sales_order_summary"
      expected_consumer_refs: "int_sales_orders:stg_bronze__orders,int_sales_order_summary:stg_bronze__orders"
      expected_validation_results: "STG-001"

  - description: "guard -- non-staging candidate is rejected without status mutation"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-refactor-mart/stg-happy-path"
      plan_file: "docs/design/refactor-mart-stg-happy-path.md"
      candidate_id: "INT-001"
      expected_candidate_statuses: "STG-001:planned,INT-001:planned,MART-001:planned"
      expected_output_terms: "non-staging"

  - description: "[vu-1119] catalog-error -- staging application guard stops"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-refactor-mart/stg-happy-path"
      plan_file: "docs/design/refactor-mart-stg-happy-path.md"
      candidate_id: "STG-001"
      catalog_error_object: "gold.fct_sales"
      catalog_error_code: "TYPE_MAPPING_UNSUPPORTED"
      catalog_error_message: "Unsupported type in eval fixture."
      expected_candidate_statuses: "STG-001:planned,INT-001:planned,MART-001:planned"
      expected_final_output_terms: "CATALOG_ERRORS_UNRESOLVED,TYPE_MAPPING_UNSUPPORTED"
      unchanged_catalog_object: "gold.fct_sales"
      unchanged_paths: "docs/design/refactor-mart-stg-happy-path.md,dbt/models"
    assert:
      - type: javascript
        value: file://../../assertions/check-output-terms.js
      - type: javascript
        value: file://../../assertions/check-refactor-mart-stg-execution.js
      - type: javascript
        value: file://../../assertions/check-guard-stop.js

  - description: "candidate isolation -- one staging candidate leaves unrelated staging candidates planned"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-refactor-mart/stg-partial-failure"
      plan_file: "docs/design/refactor-mart-stg-partial-failure.md"
      candidate_id: "STG-001"
      expected_candidate_statuses: "STG-001:applied,STG-002:planned,STG-003:planned,STG-004:planned,INT-001:planned"
      expected_output_terms: "applied,stg_bronze__orders,int_sales_orders"
      expected_consumer_refs: "int_sales_orders:stg_bronze__orders"
      expected_validation_results: "STG-001"

  - description: "blocked -- missing staging output records blocked reason"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-refactor-mart/stg-partial-failure"
      plan_file: "docs/design/refactor-mart-stg-partial-failure.md"
      candidate_id: "STG-003"
      expected_candidate_statuses: "STG-001:planned,STG-002:planned,STG-003:blocked,STG-004:planned,INT-001:planned"
      expected_output_terms: "blocked,STG-003"
      expected_blocked_reasons: "STG-003"
