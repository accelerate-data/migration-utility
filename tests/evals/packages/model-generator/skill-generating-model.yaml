# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Generate-model skill — dbt model generation from stored procedures"

prompts:
  - file://../../prompts/skill-generating-model.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 30
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
  assert:
    - type: javascript
      value: file://../../assertions/check-dbt-model.js

tests:
  # ── simple INSERT → table materialization ─────────────────────
  - description: "simple-insert-table — DimProduct MERGE → dbt model"
    vars:
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
