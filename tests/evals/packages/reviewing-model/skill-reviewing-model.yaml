# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Reviewing-model skill — dbt standards, correctness, and test integration"

prompts:
  - id: reviewing-model
    label: reviewing-model
    raw: file://../../prompts/skill-reviewing-model.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

providers:
  - file://../../providers/haiku-60.yaml

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-model-review.js

tests:
  # --- VU-869: pattern-specific code review cases ---

  - description: "[smoke] review-controls — SelectIntoTarget mart missing control columns"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-approved"
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      expected_status: "revision_requested"
      expect_standards_passed: "false"
      expected_feedback_codes: "MDL_005,MDL_006"

  - description: "[vu-1119] catalog-error — model review readiness guard stops"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-approved-clean"
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      catalog_error_object: "silver.SelectIntoTarget"
      catalog_error_code: "TYPE_MAPPING_UNSUPPORTED"
      catalog_error_message: "Unsupported type in eval fixture."
      expected_final_output_terms: "CATALOG_ERRORS_UNRESOLVED"
      unchanged_catalog_object: "silver.SelectIntoTarget"
      unchanged_paths: "dbt/models"
      expect_only_gitkeep_dirs: "model-review-results"
    assert:
      - type: javascript
        value: file://../../assertions/check-guard-stop.js

  - description: "review-revision — incorrect incremental exception flagged"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-revision"
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      expected_status: "revision_requested"

  # --- VU-877: stable codes, tiered feedback, ack_required ---

  - description: "review-standards-mdl005 — InsertSelectTarget missing _dbt_run_id"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-standards-mdl005"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_status: "revision_requested"
      expect_standards_passed: "false"
      expected_feedback_codes: "MDL_005"

  - description: "review-feedback-structure — all items have code and ack_required"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-feedback-structure"
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      expected_status: "revision_requested"

  # --- VU-878: correctness, test-integration, and standards scenarios ---

  - description: "review-approved-clean — SelectIntoTarget clean mart passes"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-approved-clean"
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      expected_status: "approved"
      expect_standards_passed: "true"
      expect_correctness_passed: "true"
      expect_test_integration_passed: "true"

  - description: "multi-table-selected-slice — SelectIntoTarget review ignores unrelated writer logic"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/multi-table-selected-slice"
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      expected_status: "approved"
      expect_standards_passed: "true"
      expect_correctness_passed: "true"
      expect_test_integration_passed: "true"
      rejected_feedback_terms: "creditcard,unrelatedtarget,unrelated"
      rejected_issue_terms: "creditcard,unrelatedtarget,unrelated"

  - description: "review-correctness — UpdateJoinTarget validates against selected source SQL"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-correctness"
      target_table: "silver.UpdateJoinTarget"
      writer: "silver.usp_load_UpdateJoinTarget"
      expected_status: "revision_requested"
      expect_correctness_passed: "false"
      expect_test_integration_passed: "true"
      expected_feedback_codes: "REVIEW_CORRECTNESS_GAP"

  - description: "review-standards-sql001 — UpdateJoinTarget uppercase keyword"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-standards-sql001"
      target_table: "silver.UpdateJoinTarget"
      writer: "silver.usp_load_UpdateJoinTarget"
      expected_status: "revision_requested"
      expect_standards_passed: "false"
      expected_feedback_codes: "SQL_001"

  - description: "review-standards-direct-source — mart uses source() despite staging wrapper"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-standards-direct-source"
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      expected_status: "revision_requested"
      expect_standards_passed: "false"
      expected_feedback_codes: "MDL_016"

  - description: "review-standards-seed-source — mart uses source() for seed dependency"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-standards-seed-source"
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      expected_status: "revision_requested"
      expect_standards_passed: "false"
      expected_feedback_codes: "MDL_017"

  - description: "review-test-integration — DimProduct unit tests in YAML"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-test-integration"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      expected_status: "revision_requested"
      expect_standards_passed: "false"
      expected_feedback_codes: "MDL_005,MDL_006"

  # --- VU-880: deferred standards scenarios ---

  - description: "review-standards-final-cte — DimProduct missing final CTE"
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-model/review-standards-final-cte"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      expected_status: "revision_requested"
      expect_standards_passed: "false"
      expected_feedback_codes: "CTE_002"
