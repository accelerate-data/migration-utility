# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Listing-objects skill — read-only catalog browsing via list/show/refs"

metadata:
  eval_tier: light

prompts:
  - id: listing-objects
    label: listing-objects
    raw: file://../../prompts/skill-listing-objects.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-listing-output.js

tests:
  - description: "[smoke] list-tables — reads catalog object names"
    vars:
      fixture_path: "tests/evals/fixtures/listing-objects/source-table-guard"
      request_text: "list tables"
      expected_terms: "silver.dimsource"

  - description: "list-sources — returns only confirmed source tables"
    vars:
      fixture_path: "tests/evals/fixtures/listing-objects/source-table-guard"
      request_text: "list sources"
      expected_terms: "silver.dimsource"

  - description: "show-table — surfaces columns and selected writer context"
    vars:
      fixture_path: "tests/evals/fixtures/analyzing-table/merge"
      request_text: "show silver.DimProduct"
      expected_terms: "silver.dimproduct,productkey,productalternatekey"

  - description: "refs-table — surfaces writer references"
    vars:
      fixture_path: "tests/evals/fixtures/analyzing-table/merge"
      request_text: "refs silver.DimProduct"
      expected_terms: "writer,silver.usp_load_dimproduct"

  - description: "show-view — surfaces referenced base table"
    vars:
      fixture_path: "tests/evals/fixtures/analyzing-table/view-scope-passthrough"
      request_text: "show silver.vDimSalesTerritory"
      expected_terms: "silver.vdimsalesterritory,dimsalesterritory"

  - description: "show-source-table — source tables still surface current catalog state"
    vars:
      fixture_path: "tests/evals/fixtures/listing-objects/source-table-guard"
      request_text: "show silver.DimSource"
      expected_terms: "silver.dimsource,sourcekey,is_source"

  - description: "refs-procedure — unsupported refs target returns payload error"
    vars:
      fixture_path: "tests/evals/fixtures/analyzing-table/merge"
      request_text: "refs silver.usp_load_dimproduct"
      expected_terms: "procedure,refs only works,views, and functions"
