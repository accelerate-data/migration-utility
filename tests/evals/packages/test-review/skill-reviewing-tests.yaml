# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Reviewing-tests skill — branch coverage and fixture quality gate"

prompts:
  - file://../../prompts/skill-reviewing-tests.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 60
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      append_allowed_tools:
        - Read
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
    iteration_suffix: ""
  assert:
    - type: javascript
      value: file://../../assertions/check-test-review.js

tests:
  - description: "approved — DimProduct complete branch coverage and realistic fixtures"
    vars:
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      expected_status: "approved"
      min_covered_branches: 2

  - description: "revision-requested — DimCustomer incomplete coverage and poor fixture quality"
    vars:
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      expected_status: "revision_requested"
