# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Scoping agent — writer resolution from MigrationTest"

prompts:
  - file://../../prompts/agent-scoping.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 30
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
  options:
    transform: |
      const m = output.match(/\{[\s\S]*"schema_version"[\s\S]*"summary"[\s\S]*\}/);
      m ? m[0] : output
  assert:
    - type: contains-json
      value: file://../../../../lib/shared/schemas/candidate_writers.json

tests:
  # ── resolved: direct MERGE writer ─────────────────────────────
  - description: "resolved — DimProduct single MERGE writer"
    vars:
      target_table: "silver.DimProduct"
      scenario_id: "resolved"
    assert:
      - type: javascript
        value: "JSON.parse(output).results[0].status === 'resolved'"
      - type: javascript
        value: "JSON.parse(output).results[0].selected_writer.toLowerCase().includes('usp_load_dimproduct')"
      - type: javascript
        value: "JSON.parse(output).summary.error === 0"

  # ── ambiguous_multi_writer: two writers for DimCustomer ───────
  - description: "ambiguous — DimCustomer Full + Delta writers"
    vars:
      target_table: "silver.DimCustomer"
      scenario_id: "ambiguous-multi-writer"
    assert:
      - type: javascript
        value: "JSON.parse(output).results[0].status === 'ambiguous_multi_writer'"
      - type: javascript
        value: "JSON.parse(output).results[0].candidate_writers.length >= 2"

  # ── call-graph: EXEC chain orchestrator ───────────────────────
  - description: "call-graph — FactInternetSales EXEC orchestrator"
    vars:
      target_table: "silver.FactInternetSales"
      scenario_id: "call-graph"
    assert:
      - type: javascript
        value: "JSON.parse(output).results[0].status === 'resolved' && JSON.parse(output).summary.error === 0"

  # ── no-writer-found: no procedures write to DimGeography ──────
  - description: "no-writer-found — DimGeography has no writers"
    vars:
      target_table: "silver.DimGeography"
      scenario_id: "no-writer-found"
    assert:
      - type: javascript
        value: "JSON.parse(output).results[0].status === 'no_writer_found'"

  # ── dynamic-sql: sp_executesql only ───────────────────────────
  - description: "dynamic-sql — DimCurrency sp_executesql"
    vars:
      target_table: "silver.DimCurrency"
      scenario_id: "dynamic-sql"
    assert:
      - type: javascript
        value: |
          const s = JSON.parse(output).results[0].status;
          return (s === 'resolved' || s === 'no_writer_found') && JSON.parse(output).summary.error === 0;

  # ── error-cross-db: cross-database reference ──────────────────
  - description: "error — DimEmployee cross-database reference"
    vars:
      target_table: "silver.DimEmployee"
      scenario_id: "error-cross-db"
    assert:
      - type: javascript
        value: |
          const r = JSON.parse(output).results[0];
          return r.status === 'error' ||
            (r.warnings && r.warnings.some(w => w.code && w.code.includes('CROSS_DATABASE')));

  # ── writer-through-view ───────────────────────────────────────
  - description: "writer-through-view — DimPromotion via updateable view"
    vars:
      target_table: "silver.DimPromotion"
      scenario_id: "writer-through-view"
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.results[0].status === 'resolved' &&
            d.results[0].selected_writer.toLowerCase().includes('usp_load_dimpromotion') &&
            d.summary.error === 0;

  # ── mv-as-target: indexed view target ─────────────────────────
  - description: "mv-as-target — DimSalesTerritory indexed view"
    vars:
      target_table: "silver.DimSalesTerritory"
      scenario_id: "mv-as-target"
    assert:
      - type: javascript
        value: |
          const s = JSON.parse(output).results[0].status;
          return (s === 'resolved' || s === 'no_writer_found') && JSON.parse(output).summary.error === 0;
