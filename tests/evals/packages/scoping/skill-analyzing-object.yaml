# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Analyzing-object skill — claude_assisted procedure analysis"

prompts:
  - file://../../prompts/skill-analyzing-object.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 30
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
  assert:
    - type: javascript
      value: file://../../assertions/check-procedure-catalog.js

tests:
  # ── resolved: direct MERGE writer ─────────────────────────────
  - description: "resolved — DimProduct single MERGE writer"
    vars:
      target_table: "silver.usp_load_DimProduct"
      expected_content: "merge"

  # ── ambiguous_multi_writer: two writers for DimCustomer ───────
  - description: "ambiguous — DimCustomer Full + Delta writers"
    vars:
      target_table: "silver.usp_load_DimCustomer_Full"
      expected_content: "truncate"

  # ── call-graph: EXEC chain orchestrator ───────────────────────
  - description: "call-graph — FactInternetSales EXEC orchestrator"
    vars:
      target_table: "silver.usp_load_FactInternetSales"

  # ── dynamic-sql: sp_executesql only ───────────────────────────
  - description: "dynamic-sql — DimCurrency sp_executesql"
    vars:
      target_table: "silver.usp_load_DimCurrency"

  # ── error-cross-db: cross-database reference ──────────────────
  - description: "error — DimEmployee cross-database reference"
    vars:
      target_table: "silver.usp_load_DimEmployee"

  # ── writer-through-view ───────────────────────────────────────
  - description: "writer-through-view — DimPromotion via updateable view"
    vars:
      target_table: "silver.usp_load_DimPromotion"
      expected_content: "vw_dimpromotion"

  # ── DimCustomer Delta (MERGE variant) ─────────────────────────
  - description: "resolved — DimCustomer Delta MERGE writer"
    vars:
      target_table: "silver.usp_load_DimCustomer_Delta"
      expected_content: "merge"

  # ── staging leaf procedure ────────────────────────────────────
  - description: "resolved — FactInternetSales staging leaf (TRUNCATE+INSERT)"
    vars:
      target_table: "silver.usp_stage_FactInternetSales"
