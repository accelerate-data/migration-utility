# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Generating-tests skill — branch enumeration and fixture synthesis"

prompts:
  - file://../../prompts/skill-generating-tests.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 70
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-test-spec.js

tests:
  - description: "merge — DimProduct matched and not-matched arms"
    vars:
      fixture_path: "tests/evals/fixtures/generating-tests/merge"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      expected_status: "ok,partial"
      expected_coverage: "complete,partial"
      min_branch_count: 5
      min_scenario_count: 4
      expected_output_terms: "branch_manifest,unit_tests"

  - description: "exec-chain — FactInternetSales transitive writer logic"
    vars:
      fixture_path: "tests/evals/fixtures/generating-tests/exec-chain"
      target_table: "silver.FactInternetSales"
      writer: "silver.usp_load_FactInternetSales"
      expected_status: "ok"
      expected_coverage: "complete"
      min_branch_count: 5
      min_scenario_count: 5
      expected_output_terms: "salesorderheader,salesorderdetail"

  - description: "dynamic-sql — DimCurrency untestable rationale"
