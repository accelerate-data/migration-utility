# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Generating-tests skill — branch enumeration and fixture synthesis for tables and views"

prompts:
  - id: generating-tests
    label: generating-tests
    raw: file://../../prompts/skill-generating-tests.txt
  - id: generating-tests-view
    label: generating-tests-view
    raw: file://../../prompts/skill-generating-tests-view.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 80
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-test-spec.js

tests:
  # ── merge — DimProduct MERGE WHEN MATCHED / NOT MATCHED ─────────────────────
  - description: "merge — DimProduct MERGE matched and not-matched branches"
    prompts: ["generating-tests"]
    vars:
      fixture_path: "tests/evals/fixtures/generating-tests/merge"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      min_branch_count: "2"
      min_scenario_count: "2"
      expected_coverage: "complete"

  # ── insert-select — InsertSelectTarget INSERT INTO ... SELECT ────────────────
  - description: "insert-select — InsertSelectTarget insert-select"
    prompts: ["generating-tests"]
