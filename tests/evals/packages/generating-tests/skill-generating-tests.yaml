# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Generating-tests skill — tests moved to cmd-generate-tests package"

# All tests have been migrated to packages/cmd-generate-tests/cmd-generate-tests.yaml
# so they run through the full generate + review loop.

prompts:
  - id: generating-tests
    label: generating-tests
    raw: file://../../prompts/skill-generating-tests.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 70
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

tests: []
