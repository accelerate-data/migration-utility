# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "refactor command — multi-table CTE restructuring orchestration"

prompts:
  - file://../../prompts/cmd-refactor.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 100
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
  assert:
    - type: javascript
      value: file://../../assertions/check-command-summary.js

tests:
  # ── happy path: 2 tables both refactor ────────────────────────
  - description: "happy-path — InsertSelectTarget + UpdateJoinTarget both refactor"
    vars:
      target_tables: "silver.InsertSelectTarget silver.UpdateJoinTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok", "silver.UpdateJoinTarget": "ok"}'
      expected_output_terms: "ok"

  # ── error + clean: missing prerequisite ────────────────────────
  - description: "error+clean — DimProduct (no test-spec) + InsertSelectTarget (ok)"
    vars:
      target_tables: "silver.DimProduct silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.DimProduct": "error", "silver.InsertSelectTarget": "ok"}'
      expected_error_codes: "test_spec_not_found"
      expected_output_terms: "error"

  # ── guard fails: no profile ────────────────────────────────────
  - description: "guard-fail — DimGeography has no profile, blocked at guard"
    vars:
      target_tables: "silver.DimGeography"
      expected_item_statuses: '{"silver.DimGeography": "error"}'
      expected_error_codes: "profile_not_completed"

  # ── partial: complex proc may not fully pass audit ─────────────
  - description: "partial-ok — DimCurrency dynamic SQL, partial status acceptable"
    vars:
      target_tables: "silver.DimCurrency"
      expected_item_statuses: '{"silver.DimCurrency": "ok,partial,error"}'
      expected_output_terms: "dynamic"
