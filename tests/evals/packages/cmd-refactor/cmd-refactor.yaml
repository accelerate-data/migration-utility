# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "refactor command — multi-table CTE restructuring orchestration"

prompts:
  - id: cmd-refactor
    label: cmd-refactor
    raw: file://../../prompts/cmd-refactor.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

providers:
  - file://../../providers/sonnet-120.yaml

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-command-summary.js

tests:
  # ── happy path: 2 tables both refactor ────────────────────────
  - description: "[smoke] happy-path — InsertSelectTarget + UpdateJoinTarget both refactor"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-refactor/happy-path"
      target_tables: "silver.InsertSelectTarget silver.UpdateJoinTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok,partial", "silver.UpdateJoinTarget": "ok,partial"}'

  # ── error-clean: missing prerequisite ──────────────────────────
  - description: "error-clean — DimGeography no profile + InsertSelectTarget ok"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-refactor/error-clean"
      target_tables: "silver.DimGeography silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.DimGeography": "error", "silver.InsertSelectTarget": "ok,partial"}'
      expected_error_codes: "CONTEXT_PREREQUISITE_MISSING"

  # ── guard fails: no scoping ────────────────────────────────────
  - description: "guard-fail — DimPromotion has no scoping, blocked at guard"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-refactor/guard-fail"
      target_tables: "silver.DimPromotion"
      expected_item_statuses: '{"silver.DimPromotion": "error"}'
      expected_error_codes: "test_gen_not_complete"

  # ── partial: complex proc may not fully pass audit ─────────────
  - description: "partial — DimCurrency dynamic SQL partial status"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-refactor/partial"
      target_tables: "silver.DimCurrency"
      expected_item_statuses: '{"silver.DimCurrency": "ok,partial,error"}'

  # ── oracle regression ────────────────────────────────────────
  # Verifies that the refactor command restructures the INSERT+CTE body into dbt
  # import/logical/final CTE form. Pre-committed scoping and profile sections allow
  # guards to pass.
  - description: "oracle — refactor — CHANNEL_SALES_SUMMARY CTE restructured with final"
    vars:
      fixture_path: "tests/evals/fixtures/oracle-regression"
      target_tables: "sh.CHANNEL_SALES_SUMMARY"
      target_table: "sh.channel_sales_summary"
      expected_item_statuses: '{"sh.CHANNEL_SALES_SUMMARY": "ok,partial"}'
      expected_status: "ok,partial"
      expected_extracted_terms: "channel_totals,amount_sold"
      expected_refactored_terms: "with,final"
      expected_output_terms: "ok"
    assert:
      - type: javascript
        value: file://../../assertions/check-refactored-sql.js
