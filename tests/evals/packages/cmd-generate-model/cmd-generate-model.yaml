# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "generate-model command — multi-table generation + review loop orchestration"

prompts:
  - file://../../prompts/cmd-generate-model.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 120
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-command-summary.js
    - type: javascript
      value: file://../../assertions/check-model-generator-input.js

tests:
  # ── happy path: 2 tables, both generate dbt models ──────────
  - description: "happy-path — InsertSelectTarget + UpdateJoinTarget both generate models"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-model/happy-path"
      target_tables: "silver.InsertSelectTarget silver.UpdateJoinTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok", "silver.UpdateJoinTarget": "ok"}'
      expected_output_terms: "ok"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── review-cycle: single table triggers review feedback ──────
  - description: "review-cycle — CorrelatedSubqueryTarget review loop"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-model/review-cycle"
      target_tables: "silver.CorrelatedSubqueryTarget"
      target_table: "silver.CorrelatedSubqueryTarget"
      expected_item_statuses: '{"silver.CorrelatedSubqueryTarget": "ok"}'
      expected_output_terms: "review"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── error-clean: missing-scoping table + good table ─────────
  - description: "error-clean — DimProduct no scoping + InsertSelectTarget ok"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-model/error-clean"
      target_tables: "silver.DimProduct silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.DimProduct": "error", "silver.InsertSelectTarget": "ok"}'
      expected_error_codes: "scoping_not_completed"
      expected_output_terms: "error"

  # ── planning sweep: 2 tables share source → 1 shared stg ─────
  - description: "planning-sweep-shared-stg — InsertSelectTarget + SingleCteTarget share bronze.Product, sweep creates ONE stg_product.sql used by both marts"
    vars:
      fixture_path: "tests/evals/fixtures/planning-sweep-shared-stg"
      target_tables: "silver.InsertSelectTarget silver.SingleCteTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok", "silver.SingleCteTarget": "ok"}'
      expected_output_terms: "ok"
      expected_stg_files: "stg_product"
      expected_stg_terms: "ephemeral"
      expected_model_terms: "ref('stg_product')"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js
