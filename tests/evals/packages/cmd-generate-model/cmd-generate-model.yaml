# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "generate-model command — multi-table generation + review loop orchestration"

prompts:
  - id: cmd-generate-model
    label: cmd-generate-model
    raw: file://../../prompts/cmd-generate-model.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 120
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-command-summary.js
    - type: javascript
      value: file://../../assertions/check-model-generator-input.js
    - type: javascript
      value: file://../../assertions/check-dbt-refs.js

tests:
  # ── happy path: 2 tables, both generate dbt models ──────────
  - description: "happy-path — InsertSelectTarget + UpdateJoinTarget both generate models"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-model/happy-path"
      target_tables: "silver.InsertSelectTarget silver.UpdateJoinTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok", "silver.UpdateJoinTarget": "ok"}'
      expected_output_terms: "ok"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── review-cycle: single table triggers review feedback ──────
  - description: "review-cycle — CorrelatedSubqueryTarget review loop"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-model/review-cycle"
      target_tables: "silver.CorrelatedSubqueryTarget"
      target_table: "silver.CorrelatedSubqueryTarget"
      expected_item_statuses: '{"silver.CorrelatedSubqueryTarget": "ok"}'
      expected_output_terms: "review"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── error-clean: missing-scoping table + good table ─────────
  - description: "error-clean — DimProduct no scoping + InsertSelectTarget ok"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-model/error-clean"
      target_tables: "silver.DimProduct silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.DimProduct": "error", "silver.InsertSelectTarget": "ok"}'
      expected_error_codes: "scoping_not_completed"
      expected_output_terms: "error"

  # ── VU-977: cross-model ref() resolution ─────────────────────
  - description: "cross-model-ref — fact mart uses ref() for existing dim, source() only for bronze"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/cross-model-ref"
      target_tables: "silver.FactSales"
      target_table: "silver.FactSales"
      expected_item_statuses: '{"silver.FactSales": "ok"}'
      expected_model_terms: "ref('dim_customer'),ref('stg_salesorder')"
      forbidden_model_terms: "source('silver'"
      expected_stg_files: "stg_salesorder"
      expected_stg_terms: "source("
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── planning sweep: 2 tables share source → 1 shared stg ─────
  - description: "planning-sweep-shared-stg — InsertSelectTarget + SingleCteTarget share bronze.Product, sweep creates ONE stg_product.sql used by both marts"
    vars:
      fixture_path: "tests/evals/fixtures/planning-sweep-shared-stg"
      target_tables: "silver.InsertSelectTarget silver.SingleCteTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok", "silver.SingleCteTarget": "ok"}'
      expected_output_terms: "ok"
      expected_stg_files: "stg_product"
      expected_stg_terms: "ephemeral"
      expected_model_terms: "ref('stg_product')"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── quality-modular-split ─────────────────────────────────────
  - description: "quality-modular-split — InsertSelectTarget stg + mart models"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/quality-modular-split"
      target_tables: "silver.InsertSelectTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok"}'
      expected_model_terms: "ref('stg_insertselecttarget'),materialized='table'"
      expected_stg_files: "stg_insertselecttarget"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── quality-style ────────────────────────────────────────────
  - description: "quality-style — lowercase keywords and snake_case names"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/quality-style"
      target_tables: "silver.InsertSelectTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok"}'
      expected_model_terms: "with,select,from,materialized="
      forbidden_model_terms: "SELECT,FROM,INSERT,UPDATE"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── select-into ─────────────────────────────────────────────
  - description: "select-into — SelectIntoTarget single import CTE stg + mart"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/select-into"
      target_tables: "silver.SelectIntoTarget"
      target_table: "silver.SelectIntoTarget"
      expected_item_statuses: '{"silver.SelectIntoTarget": "ok"}'
      expected_stg_files: "stg_selectintotarget"
      expected_stg_terms: "source("
      forbidden_stg_terms: "join,group by"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── truncate-insert ─────────────────────────────────────────
  - description: "truncate-insert — DimCustomer multi-source mart with ref() calls"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/truncate-insert"
      target_tables: "silver.DimCustomer"
      target_table: "silver.DimCustomer"
      expected_item_statuses: '{"silver.DimCustomer": "ok"}'
      expected_model_terms: "ref(,materialized="
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── merge ────────────────────────────────────────────────────
  - description: "merge — DimProduct dim_scd1 table-materialized model"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/merge"
      target_tables: "silver.DimProduct"
      target_table: "silver.DimProduct"
      expected_item_statuses: '{"silver.DimProduct": "ok"}'
      expected_model_terms: "materialized='table',ref("
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── update-join ──────────────────────────────────────────────
  - description: "update-join — UpdateJoinTarget watermark incremental model"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/update-join"
      target_tables: "silver.UpdateJoinTarget"
      target_table: "silver.UpdateJoinTarget"
      expected_item_statuses: '{"silver.UpdateJoinTarget": "ok"}'
      expected_model_terms: "materialized='incremental'"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── quality-etl-columns ─────────────────────────────────────
  - description: "quality-etl-columns — _dbt_run_id control column present"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/quality-etl-columns"
      target_tables: "silver.InsertSelectTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok"}'
      expected_model_terms: "_dbt_run_id"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── quality-yaml-rendered ────────────────────────────────────
  - description: "quality-yaml-rendered — schema YAML with version and description"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/quality-yaml-rendered"
      target_tables: "silver.InsertSelectTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok"}'
      expected_output_terms: "version: 2,description"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── planning sweep: stg already on disk ──────────────────────
  - description: "planning-sweep-stg-reuse — stg_product.sql pre-seeded, reuses via ref() not source()"
    vars:
      fixture_path: "tests/evals/fixtures/planning-sweep-stg-reuse"
      target_tables: "silver.InsertSelectTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok"}'
      expected_model_terms: "ref('stg_product')"
      forbidden_model_terms: "source('bronze'"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── planning sweep: no stg on disk ───────────────────────────
  - description: "planning-sweep-no-stg — no staging on disk, creates stg_product.sql with ephemeral"
    vars:
      fixture_path: "tests/evals/fixtures/planning-sweep-no-stg"
      target_tables: "silver.InsertSelectTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok"}'
      expected_stg_files: "stg_product"
      expected_stg_terms: "ephemeral"
      expected_model_terms: "ref('stg_product')"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  # ── planning sweep: skip ──────────────────────────────────────
  - description: "planning-sweep-skip — sweep artifact recommends skip, exits without generating model"
    vars:
      fixture_path: "tests/evals/fixtures/planning-sweep-skip"
      target_tables: "silver.InsertSelectTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok"}'
      expected_action: "skip"
    assert:
      - type: javascript
        value: file://../../assertions/check-sweep-action.js

  # ── planning sweep: test-only ─────────────────────────────────
  - description: "planning-sweep-test-only — sweep artifact recommends test-only, skips generation"
    vars:
      fixture_path: "tests/evals/fixtures/planning-sweep-test-only"
      target_tables: "silver.InsertSelectTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok"}'
      expected_action: "test-only"
    assert:
      - type: javascript
        value: file://../../assertions/check-sweep-action.js

  # ── snapshot-dim-scd2 ─────────────────────────────────────────
  - description: "snapshot-dim-scd2 — SCD2 table produces dbt snapshot"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/snapshot-dim-scd2"
      target_tables: "silver.DimEmployeeSCD2"
      target_table: "silver.DimEmployeeSCD2"
      expected_item_statuses: '{"silver.DimEmployeeSCD2": "ok"}'
      expected_model_terms: "snapshot,strategy"
      forbidden_model_terms: "materialized='table'"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js
