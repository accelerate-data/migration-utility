# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "status command — migration progress dashboard with per-table stage readiness"

prompts:
  - file://../../prompts/cmd-status.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 80
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
  assert:
    - type: javascript
      value: file://../../assertions/check-status-output.js

tests:
  # ── single table: fully scoped + profiled, no test-spec ─────
  - description: "single-table — InsertSelectTarget (scoped + profiled, no sandbox)"
    vars:
      target_table: "silver.InsertSelectTarget"
      expected_stage_statuses: '{"scope": "resolved", "profile": "ok"}'
      expected_blocked_stage: "test-gen"
      expected_output_terms: "scope,profile,test-gen,blocked"
      expected_recommendation: "sandbox"

  # ── single table: no scoping at all ─────────────────────────
  - description: "single-table — DimCurrency (catalog only, no scoping)"
    vars:
      target_table: "silver.DimCurrency"
      expected_blocked_stage: "profile"
      expected_output_terms: "scope,pending"
      expected_recommendation: "scope"

  # ── single table: has profile but no scoping section ────────
  - description: "single-table — DimProduct (profile exists but no scoping section)"
    vars:
      target_table: "silver.DimProduct"
      expected_blocked_stage: "profile"
      expected_output_terms: "scope"

  # ── all tables: summary across mixed stages ─────────────────
  - description: "all-tables — summary report across all catalog tables"
    vars:
      expected_output_terms: "scope,profile,test-gen,migrate"

  # ── all objects: views and writerless N/A ────────────────────
  - description: "all-objects — views and writerless table appear in summary with type column and N/A"
    vars:
      expected_output_terms: "view,table,N/A,type"
      expected_na_object: "silver.RefCurrency"
      expected_view_objects: "silver.vDimSalesTerritory,silver.vw_DimPromotion"

  # ── diagnostic overlay — PARSE_ERROR shows ! indicator ──────────
  - description: "single-table — DimCurrency PARSE_ERROR overlays ! on refactor stage cell"
    vars:
      expected_output_terms: "dimcurrency,refactor,!"

  # ── writerless-dep view shows no blocked-by annotation ───────────
  - description: "all-objects — writerless-dep view appears in schedule with no blocked-by annotation"
    vars:
      expected_output_terms: "vw_currency_ref"
      unexpected_output_terms: "blocked by: silver.refcurrency"

  # ── What to do next section appears in batch output ──────────────
  - description: "all-tables — What to do next section appears with runnable command"
    vars:
      expected_output_terms: "what to do next"

  # ── view at profile_needed recommends /profile ───────────────────
  - description: "single-table — view at profile_needed recommends /profile not /refactor-view"
    vars:
      target_table: "silver.vw_currency_ref"
      expected_output_terms: "profile"
      unexpected_output_terms: "refactor-view"

  # ── table at migrate_needed recommends /generate-model ───────────
  - description: "all-tables — table at migrate_needed recommends /generate-model"
    vars:
      expected_output_terms: "generate-model"
