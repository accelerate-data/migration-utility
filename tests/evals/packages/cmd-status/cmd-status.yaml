# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "status command — migration progress dashboard with per-table stage readiness"

prompts:
  - id: cmd-status
    label: cmd-status
    raw: file://../../prompts/cmd-status.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

providers:
  - file://../../providers/haiku-60.yaml

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-status-output.js

tests:
  # ── status-single-insertselecttarget: scoped + profiled ──────
  - description: "[smoke] status-single-insertselecttarget — scoped + profiled, no sandbox"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-insertselecttarget"
      target_table: "silver.InsertSelectTarget"
      expected_stage_statuses: '{"scope": "ok", "profile": "ok"}'
      expected_blocked_stage: "test-gen"
      expected_output_terms: "scope,profile,test-gen,blocked"
      expected_recommendation: "generate-tests"

  # ── status-single-dimcurrency: catalog only ─────────────────
  - description: "status-single-dimcurrency — catalog only, no scoping"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-dimcurrency"
      target_table: "silver.DimCurrency"
      expected_blocked_stage: "profile"
      expected_output_terms: "scope,pending"
      expected_recommendation: "scope-tables"

  # ── status-single-dimproduct: profile exists, no scoping ────
  - description: "status-single-dimproduct — profile exists but no scoping"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-dimproduct"
      target_table: "silver.DimProduct"
      expected_blocked_stage: "profile"
      expected_output_terms: "scope"

  # ── status-all-summary: mixed stages ────────────────────────
  - description: "status-all-summary — summary report across all catalog tables"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-all-summary"
      expected_output_terms: "scope,profile,test-gen,generate"

  # ── status-all-objects: views and writerless N/A ─────────────
  - description: "status-all-objects — views and writerless tables with type column and N/A"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-all-objects"
      expected_output_terms: "view,table,N/A,type"
      expected_na_object: "silver.RefCurrency"
      expected_view_objects: "silver.vDimSalesTerritory,silver.vw_DimPromotion"

  # ── status-diagnostic: PARSE_ERROR shows ! indicator ────────────
  - description: "status-diagnostic — DimCurrency PARSE_ERROR overlays ! on refactor cell"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-diagnostic"
      expected_output_terms: "dimcurrency,refactor,!"

  # ── status-writerless-dep: no blocked-by annotation ─────────────
  - description: "status-writerless-dep — view in schedule with no blocked-by annotation"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-writerless-dep"
      expected_output_terms: "vw_currency_ref"
      unexpected_output_terms: "blocked by: silver.refcurrency"

  # ── status-all-next-steps: What to do next section ──────────────
  - description: "status-all-next-steps — What to do next with runnable command"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-all-next-steps"
      expected_output_terms: "what to do next"

  # ── status-single-view-profile: recommends /profile-tables ───────
  - description: "status-single-view-profile — view at profile_needed recommends /profile-tables"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-view-profile"
      target_table: "silver.vw_currency_ref"
      expected_output_terms: "profile-tables"
      unexpected_output_terms: "refactor-view"

  # ── status-all-migrate-recommend: recommends /generate-model ─────
  - description: "status-all-migrate-recommend — table at migrate_needed recommends /generate-model"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-all-migrate-recommend"
      expected_output_terms: "generate-model"

  # ── status-reinvoked-session: must ignore stale prior output ──────
  - description: "status-reinvoked-session — reruns status instead of reusing stale prior session output"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-all-migrate-recommend"
      prior_status_context: "Earlier `/status` incorrectly reported that `silver.DimCustomer` still needed `/scope-tables`, but the catalog has changed since then."
      expected_output_terms: "generate-model"
      unexpected_output_terms: "/scope-tables silver.dimcustomer"
