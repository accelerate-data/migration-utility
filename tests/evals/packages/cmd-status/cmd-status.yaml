# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "status command — migration progress dashboard with per-table stage readiness"

prompts:
  - id: cmd-status
    label: cmd-status
    raw: file://../../prompts/cmd-status.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

providers:
  - file://../../providers/haiku-60.yaml

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-status-output.js

tests:
  # ── status-single-insertselecttarget: scoped + profiled, ready ──────
  - description: "[smoke] status-single-insertselecttarget — scoped + profiled, ready for test generation"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-insertselecttarget"
      target_table: "silver.InsertSelectTarget"
      expected_first_command: "/generate-tests"
      expected_stage_statuses: '{"scope": "ok", "profile": "ok"}'
      expected_blocked_stage: "test-gen"
      expected_output_terms: "scope,profile,test-gen,pending,generate-tests"

  # ── status-single-insertselecttarget-missing-target ─────────────────
  - description: "status-single-insertselecttarget-missing-target — missing target setup blocks generate-tests"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-insertselecttarget-missing-target"
      target_table: "silver.InsertSelectTarget"
      expected_first_command: "!ad-migration setup-target"
      expected_stage_statuses: '{"scope": "ok", "profile": "ok"}'
      expected_blocked_stage: "test-gen"
      expected_output_terms: "scope,profile,test-gen,setup-target"
      unexpected_output_terms: "/generate-tests"

  # ── status-single-insertselecttarget-missing-sandbox ───────────────
  - description: "status-single-insertselecttarget-missing-sandbox — missing sandbox setup blocks generate-tests"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-insertselecttarget-missing-sandbox"
      target_table: "silver.InsertSelectTarget"
      expected_first_command: "!ad-migration setup-sandbox"
      expected_stage_statuses: '{"scope": "ok", "profile": "ok"}'
      expected_blocked_stage: "test-gen"
      expected_output_terms: "scope,profile,test-gen,setup-sandbox"
      unexpected_output_terms: "/generate-tests"

  # ── status-single-insertselecttarget-no-target: test-gen needs setup-target ─
  - description: "status-single-insertselecttarget-no-target — test-gen recommends setup-target before generate-tests"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-insertselecttarget-no-target"
      target_table: "silver.InsertSelectTarget"
      expected_blocked_stage: "test-gen"
      expected_output_terms: "setup-target"

  # ── status-single-insertselecttarget-no-sandbox: test-gen needs setup-sandbox ─
  - description: "status-single-insertselecttarget-no-sandbox — test-gen recommends setup-sandbox before generate-tests"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-insertselecttarget-no-sandbox"
      target_table: "silver.InsertSelectTarget"
      expected_blocked_stage: "test-gen"
      expected_output_terms: "setup-sandbox"

  # ── status-single-dimcurrency: catalog only ─────────────────
  - description: "status-single-dimcurrency — catalog only, no scoping"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-dimcurrency"
      target_table: "silver.DimCurrency"
      expected_blocked_stage: "profile"
      expected_output_terms: "scope,pending"
      expected_recommendation: "scope-tables"

  # ── status-single-dimproduct: profile exists, no scoping ────
  - description: "status-single-dimproduct — profile exists but no scoping"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-dimproduct"
      target_table: "silver.DimProduct"
      expected_blocked_stage: "profile"
      expected_output_terms: "scope"

  # ── status-all-summary: mixed stages ────────────────────────
  - description: "status-all-summary — summary report across all catalog tables"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-all-summary"
      expected_output_terms: "test-gen,migrate"

  # ── status-all-objects: views and writerless N/A ─────────────
  - description: "status-all-objects — views and writerless tables with type column and N/A"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-all-objects"
      expected_output_terms: "view,table,N/A,type"
      expected_na_object: "silver.RefCurrency"
      expected_view_objects: "silver.vDimSalesTerritory,silver.vw_DimPromotion"

  # ── status-source-seed-excluded: source/seed omitted from summary ─────
  - description: "status-source-seed-excluded — source and seed tables stay out of summary pipeline rows"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-source-seed-excluded"
      expected_output_terms: "silver.dim_customer,scope,profile,test-gen"
      unexpected_output_terms: "bronze.raw_customer,silver.seed_currency"

  # ── status-source-detail-exempt: source object detail is N/A ─────
  - description: "status-source-detail-exempt — source table detail reports workflow-exempt status"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-source-seed-excluded"
      target_table: "bronze.raw_customer"
      expected_output_terms: "workflow-exempt,N/A,scope,profile,test-gen"
      unexpected_output_terms: "/scope-tables,/profile-tables,/generate-tests,/refactor-query,/generate-model"

  # ── status-diagnostic: PARSE_ERROR shows ! indicator ────────────
  - description: "status-diagnostic — DimCurrency PARSE_ERROR renders summary error cell"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-diagnostic"
      expected_output_terms: "dimcurrency,refactor,error,diagnostics,unresolved,/status silver.dimcurrency"
      unexpected_output_terms: "DDL failed to parse"

  # ── status-reviewed-warning-hidden: accepted warning is resolved, active warning remains ──
  - description: "status-reviewed-warning-hidden — shows resolved and unresolved warning counts"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-reviewed-warning-hidden"
      expected_output_terms: "diagnostics,unresolved,resolved,/status dim.dim_address"
      expected_resolved_warnings: "1"
      unexpected_output_terms: "proc also writes dim.other"

  # ── status-writerless-dep: no blocked-by annotation ─────────────
  - description: "status-writerless-dep — view in schedule with no blocked-by annotation"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-writerless-dep"
      expected_output_terms: "vw_currency_ref"
      unexpected_output_terms: "blocked by: silver.refcurrency"

  # ── status-all-next-steps: What to do next section ──────────────
  - description: "status-all-next-steps — What to do next with runnable command"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-all-next-steps"
      expected_output_terms: "scope-tables,silver.dimdate"

  # ── status-single-view-profile: recommends /profile-tables ───────
  - description: "status-single-view-profile — view at profile_needed recommends /profile-tables"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-single-view-profile"
      target_table: "silver.vw_currency_ref"
      expected_output_terms: "profile-tables"
      unexpected_output_terms: "refactor-view"

  # ── status-all-migrate-recommend: recommends /generate-model ─────
  - description: "status-all-migrate-recommend — table at migrate_needed recommends /generate-model"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-all-migrate-recommend"
      expected_output_terms: "generate-model"

  # ── status-reinvoked-session: must ignore stale prior output ──────
  - description: "status-reinvoked-session — reruns status instead of reusing stale prior session output"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-status/status-all-migrate-recommend"
      prior_status_context: "Earlier `/status` incorrectly reported that `silver.DimCustomer` still needed `/scope-tables`, but the catalog has changed since then."
      expected_output_terms: "generate-model"
      unexpected_output_terms: "/scope-tables silver.dimcustomer"
