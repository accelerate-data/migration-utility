# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Generate-model skill — tests moved to cmd-generate-model package"

# All tests have been migrated to packages/cmd-generate-model/cmd-generate-model.yaml
# so they run through the full generate + review loop.

prompts:
  - id: generating-model
    label: generating-model
    raw: file://../../prompts/skill-generating-model.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 80
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

tests: []
