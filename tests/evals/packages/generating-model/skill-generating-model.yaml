# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Generating-model skill — baseline dbt artifact generation"

prompts:
  - id: generating-model
    label: generating-model
    raw: file://../../prompts/skill-generating-model.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

providers:
  - file://../../providers/haiku-100.yaml

tests:
  - description: "[smoke] select-into — SelectIntoTarget writes single model artifact"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/select-into"
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      expected_model_path: "models/marts/selectintotarget.sql"
      expected_model_terms: "ref('stg_bronze__product')"
      forbidden_model_terms: "materialized='table',source('bronze'"
      expected_yaml_terms: "version: 2,description"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  - description: "[vu-1119] catalog-error — generate readiness guard stops"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/select-into"
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      catalog_error_object: "silver.SelectIntoTarget"
      catalog_error_code: "TYPE_MAPPING_UNSUPPORTED"
      catalog_error_message: "Unsupported type in eval fixture."
      expected_final_output_terms: "CATALOG_ERRORS_UNRESOLVED"
      unchanged_catalog_object: "silver.SelectIntoTarget"
      unchanged_paths: "dbt/models,dbt/snapshots"
    assert:
      - type: javascript
        value: file://../../assertions/check-guard-stop.js

  - description: "multi-table-selected-slice — SelectIntoTarget model ignores unrelated writer logic"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/multi-table-selected-slice"
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      expected_model_path: "models/marts/selectintotarget.sql"
      expected_model_terms: "ref('stg_bronze__product')"
      forbidden_model_terms: "creditcard,unrelatedtarget,unrelated,source('bronze'"
      expected_yaml_terms: "version: 2,description"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  - description: "merge — DimProduct emits mart model with staging refs"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/merge"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      expected_model_path: "models/marts/dim_product.sql"
      expected_model_terms: "ref("
      forbidden_model_terms: "materialized='table'"
      expected_yaml_terms: "version: 2,description"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  - description: "quality-etl-columns — InsertSelectTarget includes _dbt_run_id"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/quality-etl-columns"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_model_path: "models/marts/insertselecttarget.sql"
      expected_model_terms: "_dbt_run_id"
      forbidden_model_terms: "source('bronze'"
      expected_yaml_terms: "version: 2,description"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js

  - description: "snapshot-dim-scd2 — DimEmployeeSCD2 writes dbt snapshot"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/snapshot-dim-scd2"
      target_table: "silver.DimEmployeeSCD2"
      writer: "silver.usp_load_DimEmployeeSCD2"
      expected_model_path: "snapshots/dim_employee_scd2.sql"
      expected_model_terms: "snapshot,strategy"
      forbidden_model_terms: "materialized='table'"
    assert:
      - type: javascript
        value: file://../../assertions/check-dbt-model.js
