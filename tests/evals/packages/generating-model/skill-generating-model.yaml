# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Generate-model skill — dbt model generation from stored procedures"

prompts:
  - file://../../prompts/skill-generating-model.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 80
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
  assert:
    - type: javascript
      value: file://../../assertions/check-dbt-model.js

tests:
  # ── insert-select ─────────────────────────────────────────────
  - description: "insert-select — simple INSERT...SELECT becomes dbt select"
    vars:
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_model_terms: "materialized='table',source(,select"

  # ── update with join ──────────────────────────────────────────
  - description: "update-join — UPDATE join produces valid rewritten model"
    vars:
      target_table: "silver.UpdateJoinTarget"
      writer: "silver.usp_load_UpdateJoinTarget"
      expected_model_terms: "current_timestamp,source("

  # ── delete with where ─────────────────────────────────────────
  - description: "delete-where — DELETE with WHERE becomes keep-rows select"
    vars:
      target_table: "silver.DeleteWhereTarget"
      writer: "silver.usp_load_DeleteWhereTarget"
      graceful_no_model: "true"

  # ── select into ───────────────────────────────────────────────
  - description: "select-into — SELECT INTO recognized as staging table model"
    vars:
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      expected_model_terms: "materialized='table',with,final as"
      forbidden_model_terms: "select into"

  # ── single cte ────────────────────────────────────────────────
  - description: "single-cte — CTE restructured into import/logical/final"
    vars:
      target_table: "silver.SingleCteTarget"
      writer: "silver.usp_load_SingleCteTarget"
      expected_model_terms: "with,final as"

  # ── correlated subquery ───────────────────────────────────────
  - description: "correlated-subquery — correlated subquery preserved as valid dbt logic"
    vars:
      target_table: "silver.CorrelatedSubqueryTarget"
      writer: "silver.usp_load_CorrelatedSubqueryTarget"
      expected_model_terms: "with,select"

  # ── union all ─────────────────────────────────────────────────
  - description: "union-all — UNION ALL preserved in generated sql"
    vars:
      target_table: "silver.UnionAllTarget"
      writer: "silver.usp_load_UnionAllTarget"
      expected_model_terms: "union all"

  # ── grouping sets ─────────────────────────────────────────────
  - description: "grouping-sets — GROUPING SETS preserved when supported by generated sql"
    vars:
      target_table: "silver.GroupingSetsTarget"
      writer: "silver.usp_load_GroupingSetsTarget"
      expected_model_terms: "group by"

  # ── pivot ─────────────────────────────────────────────────────
  - description: "pivot — PIVOT translated to conditional aggregation"
    vars:
      target_table: "silver.PivotTarget"
      writer: "silver.usp_load_PivotTarget"
      expected_model_terms: "case when"

  # ── window functions ──────────────────────────────────────────
  - description: "window-functions — FactInternetSales preserves analytic window expressions"
    vars:
      target_table: "silver.FactInternetSales"
      writer: "silver.usp_stage_FactInternetSales"
      expected_model_terms: "count(*) over,partition by"

  # ── outer apply ───────────────────────────────────────────────
  - description: "outer-apply — DimCustomer full reload rewrites APPLY logic"
    vars:
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      expected_model_terms: "materialized='table',min(orderdate)"

  # ── truncate + insert full reload ─────────────────────────────
  - description: "truncate-insert — DimCustomer full reload stays table materialized"
    vars:
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      expected_model_terms: "materialized='table'"

  # ── exec orchestrator ─────────────────────────────────────────
  - description: "exec-orchestrator — FactInternetSales orchestration handled gracefully"
    vars:
      target_table: "silver.FactInternetSales"
      writer: "silver.usp_load_FactInternetSales"
      graceful_no_model: "true"
      expected_output_terms: "orchestration,usp_stage_factinternetsales"

  # ── dynamic sp_executesql ─────────────────────────────────────
  - description: "dynamic-sp-executesql — DimCurrency dynamic SQL handled gracefully"
    vars:
      target_table: "silver.DimCurrency"
      writer: "silver.usp_load_DimCurrency"
      graceful_no_model: "true"

  # ── if-else control flow ─────────────────────────────────────
  - description: "if-else — IfElseTarget conditional branches decomposed into dbt logic"
    vars:
      target_table: "silver.IfElseTarget"
      writer: "silver.usp_load_IfElseTarget"
      expected_model_terms: "config(,source("

  # ── while loop ───────────────────────────────────────────────
  - description: "while-loop — WhileLoopTarget iterative pattern handled gracefully"
    vars:
      target_table: "silver.WhileLoopTarget"
      writer: "silver.usp_load_WhileLoopTarget"
      expected_model_terms: "config(,source("

  # ── static sp_executesql ─────────────────────────────────────
  - description: "static-sp-executesql — StaticSpExecTarget literal SQL resolved"
    vars:
      target_table: "silver.StaticSpExecTarget"
      writer: "silver.usp_load_StaticSpExecTarget"
      expected_model_terms: "materialized='table',source("

  # ── exec variable (dynamic @sql) ────────────────────────────
  - description: "exec-variable-model — ExecVariableTarget dynamic EXEC(@sql) graceful"
    vars:
      target_table: "silver.ExecVariableTarget"
      writer: "silver.usp_scope_ExecVariable"
      graceful_no_model: "true"

  # ── exec concat (dynamic concatenation) ─────────────────────
  - description: "exec-concat-model — ExecConcatTarget concatenated EXEC graceful"
    vars:
      target_table: "silver.ExecConcatTarget"
      writer: "silver.usp_scope_ExecConcat"
      graceful_no_model: "true"

  # ── modular split ─────────────────────────────────────────────
  - description: "modular-split — InsertSelectTarget with refactored SQL produces stg_ + mart models"
    vars:
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_model_terms: "ref('stg_insertselecttarget'),materialized='table'"
      expected_stg_files: "stg_insertselecttarget"


  # ── style compliance ─────────────────────────────────────────
  - description: "style-compliance — generated model uses lowercase keywords and snake_case names"
    vars:
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_model_terms: "with,select,from,materialized="
      forbidden_model_terms: "SELECT,FROM,INSERT,UPDATE"
