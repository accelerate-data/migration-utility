# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Generate-model skill — dbt model generation from refactored SQL"

prompts:
  - file://../../prompts/skill-generating-model.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 80
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-dbt-model.js

tests:
  # ── quality-modular-split ─────────────────────────────────────
  - description: "quality-modular-split — InsertSelectTarget stg + mart models"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/quality-modular-split"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_model_terms: "ref('stg_insertselecttarget'),materialized='table'"
      expected_stg_files: "stg_insertselecttarget"

  # ── quality-style ────────────────────────────────────────────
  - description: "quality-style — lowercase keywords and snake_case names"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/quality-style"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_model_terms: "with,select,from,materialized="
      forbidden_model_terms: "SELECT,FROM,INSERT,UPDATE"

  # --- VU-878: CTE-shape and materialization scenarios ---

  # ── select-into ─────────────────────────────────────────────
  - description: "select-into — SelectIntoTarget single import CTE stg + mart"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/select-into"
      target_table: "silver.SelectIntoTarget"
      writer: "silver.usp_load_SelectIntoTarget"
      expected_stg_files: "stg_selectintotarget"
      expected_stg_terms: "source("
      forbidden_stg_terms: "join,group by"

  # ── truncate-insert ─────────────────────────────────────────
  - description: "truncate-insert — DimCustomer multi-source mart with ref() calls"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/truncate-insert"
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      expected_model_terms: "ref(,materialized="

  # ── merge ────────────────────────────────────────────────────
  - description: "merge — DimProduct dim_scd1 table-materialized model"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/merge"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      expected_model_terms: "materialized='table',ref("

  # ── update-join ──────────────────────────────────────────────
  - description: "update-join — UpdateJoinTarget watermark incremental model"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/update-join"
      target_table: "silver.UpdateJoinTarget"
      writer: "silver.usp_load_UpdateJoinTarget"
      expected_model_terms: "materialized='incremental'"

  # ── quality-etl-columns ─────────────────────────────────────
  - description: "quality-etl-columns — _dbt_run_id control column present"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/quality-etl-columns"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_model_terms: "_dbt_run_id"

  # ── quality-yaml-rendered ────────────────────────────────────
  - description: "quality-yaml-rendered — schema YAML with version and description"
    vars:
      fixture_path: "tests/evals/fixtures/generating-model/quality-yaml-rendered"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_output_terms: "version: 2,description"

  # ── planning sweep: stg already on disk ──────────────────────
  - description: "planning-sweep-stg-reuse — stg_product.sql pre-seeded, skill reuses via ref() not source()"
    vars:
      fixture_path: "tests/evals/fixtures/planning-sweep-stg-reuse"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_model_terms: "ref('stg_product')"
      forbidden_model_terms: "source('bronze'"

  # ── planning sweep: no stg on disk ───────────────────────────
  - description: "planning-sweep-no-stg — no staging on disk, skill creates stg_product.sql with ephemeral"
    vars:
      fixture_path: "tests/evals/fixtures/planning-sweep-no-stg"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_stg_files: "stg_product"
      expected_stg_terms: "ephemeral"
      expected_model_terms: "ref('stg_product')"

  # ── planning sweep: skip (mart exists + tests passing) ───────
  - description: "planning-sweep-skip — sweep artifact recommends skip, skill exits without generating model"
    vars:
      fixture_path: "tests/evals/fixtures/planning-sweep-skip"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_action: "skip"
    assert:
      - type: javascript
        value: file://../../assertions/check-sweep-action.js

  # ── planning sweep: test-only (mart exists, no passing tests) ─
  - description: "planning-sweep-test-only — sweep artifact recommends test-only, skill skips generation and goes to compile"
    vars:
      fixture_path: "tests/evals/fixtures/planning-sweep-test-only"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_action: "test-only"
    assert:
      - type: javascript
        value: file://../../assertions/check-sweep-action.js
