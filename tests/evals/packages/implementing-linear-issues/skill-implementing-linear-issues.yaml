# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Implementing-linear-issues skill — codebase-first clarification and plan gate before coding"

prompts:
  - id: implementing-linear-issues
    label: implementing-linear-issues
    raw: file://../../prompts/skill-implementing-linear-issues.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 20
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-linear-skill-contract.js

tests:
  - description: "implement-issue — creates branch/worktree first, searches code first, no PR/push"
    vars:
      expect_searches_codebase_first: "true"
      expect_enters_plan_mode: "true"
      expect_creates_branch_and_worktree_first: "true"
      expect_stops_on_branch_or_worktree_failure: "true"
      expect_creates_pr: "false"
      required_terms: "branch,worktree,plan"
      forbidden_terms: "pushes_git\":true,implements_before_plan_approval\":true"
