# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "profile command — multi-table parallel profiling orchestration"

prompts:
  - file://../../prompts/cmd-profile.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 80
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-command-summary.js

tests:
  # ── happy path: 2 tables with scoping set, both profile ok ──
  - description: "happy-path — InsertSelectTarget + UpdateJoinTarget both profile ok"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-profile/happy-path"
      target_tables: "silver.InsertSelectTarget silver.UpdateJoinTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok", "silver.UpdateJoinTarget": "ok"}'
      expected_output_terms: "ok"
      expected_status: "ok"
    assert:
      - type: javascript
        value: file://../../assertions/check-table-profile.js

  # ── error-clean: table missing scoping + table with scoping ──
  - description: "error-clean — DimProduct no scoping + InsertSelectTarget ok"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-profile/error-clean"
      target_tables: "silver.DimProduct silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.DimProduct": "error", "silver.InsertSelectTarget": "ok"}'
      expected_error_codes: "scoping_not_completed"
      expected_output_terms: "error"

  # ── multi-table-writer: dim_address profiles via writer_ddl_slice ─
  - description: "multi-table-writer — dim_address profiles using address-only DDL slice, not credit_card logic"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-profile/multi-table-writer"
      target_tables: "dim.dim_address"
      target_table: "dim.dim_address"
      expected_item_statuses: '{"dim.dim_address": "ok"}'
      expected_output_terms: "ok"
      expected_status: "ok"
    assert:
      - type: javascript
        value: file://../../assertions/check-table-profile.js
      - type: llm-rubric
        value: >
          The profiling analysis describes address dimension logic (address_id, address_line_1, city,
          state_province_id, postal_code, SCD2 valid_from/valid_to/is_current) and does NOT describe
          credit card fields (card_type, exp_month, exp_year, credit_card_id) as the target table logic.
          The response acknowledges the proc is a multi-table writer but correctly scopes analysis
          to dim_address only.
