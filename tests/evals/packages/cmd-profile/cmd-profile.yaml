# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "profile command — multi-table parallel profiling orchestration"

prompts:
  - id: cmd-profile
    label: cmd-profile
    raw: file://../../prompts/cmd-profile.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

providers:
  - file://../../providers/haiku-60.yaml

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-command-summary.js

tests:
  # ── happy path: 2 tables with scoping set, both profile ok ──
  - description: "[smoke] happy-path — InsertSelectTarget + UpdateJoinTarget both profile ok"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-profile/happy-path"
      target_tables: "silver.InsertSelectTarget silver.UpdateJoinTarget"
      target_table: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok", "silver.UpdateJoinTarget": "ok"}'
      expected_output_terms: "ok"
      expected_status: "ok"
    assert:
      - type: javascript
        value: file://../../assertions/check-table-profile.js

  # ── mixed happy path: both tables are scoping-ready and should profile ok ──
  - description: "error-clean — DimProduct and InsertSelectTarget both profile ok"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-profile/error-clean"
      target_tables: "silver.DimProduct silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.DimProduct": "ok", "silver.InsertSelectTarget": "ok"}'
      expected_output_terms: "ok"

  # ── multi-table-writer: dim_address profiles via selected_writer_ddl_slice ─
  - description: "multi-table-writer — dim_address profiles using address-only DDL slice, not credit_card logic"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-profile/multi-table-writer"
      target_tables: "dim.dim_address"
      target_table: "dim.dim_address"
      expected_item_statuses: '{"dim.dim_address": "ok"}'
      expected_output_terms: "ok"
      expected_status: "ok"
    assert:
      - type: javascript
        value: file://../../assertions/check-table-profile.js
      - type: llm-rubric
        value: >
          The profiling analysis describes address dimension logic (address_id, address_line_1, city,
          state_province_id, postal_code, SCD2 valid_from/valid_to/is_current) and does NOT describe
          credit card fields (card_type, exp_month, exp_year, credit_card_id) as the target table logic.
          The response acknowledges the proc is a multi-table writer but correctly scopes analysis
          to dim_address only.

  # ── oracle regression ────────────────────────────────────────
  # Verifies that the profile command produces a valid profile for an Oracle target
  # table. Pre-committed scoping section allows the guard to pass without running scope.
  - description: "oracle — profile — CHANNEL_SALES_SUMMARY profiles as fact_aggregate"
    provider: file://../../providers/sonnet-120.yaml
    vars:
      fixture_path: "tests/evals/fixtures/oracle-regression"
      target_tables: "sh.CHANNEL_SALES_SUMMARY"
      target_table: "sh.channel_sales_summary"
      expected_item_statuses: '{"sh.CHANNEL_SALES_SUMMARY": "ok"}'
      expected_status: "ok"
      expected_output_terms: "ok"
    assert:
      - type: javascript
        value: file://../../assertions/check-table-profile.js
