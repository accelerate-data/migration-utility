# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Scoping-table skill — writer discovery, procedure analysis, and scope resolution for tables"

prompts:
  - file://../../prompts/skill-analyzing-table.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 80
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
  assert:
    - type: javascript
      value: file://../../assertions/check-table-scoping.js
    - type: javascript
      value: file://../../assertions/check-procedure-catalog.js

tests:
  # ── truncate-insert: DimCustomer multi-writer resolution ────
  - description: "truncate-insert — DimCustomer multi-writer resolution"
    vars:
      target_table: "silver.DimCustomer"
      target_procedure: "silver.usp_load_DimCustomer_Full"
      expected_status: "resolved"
      expected_writer: "dimcustomer_full"
      expected_content: "truncate"

  # ── merge: DimProduct single MERGE writer ───────────────────
  - description: "merge — DimProduct single MERGE writer"
    vars:
      target_table: "silver.DimProduct"
      target_procedure: "silver.usp_load_DimProduct"
      expected_status: "resolved"
      expected_writer: "dimproduct"
      expected_content: "merge"

  # ── exec-orchestrator: FactInternetSales EXEC chain writer ──
  - description: "exec-orchestrator — FactInternetSales EXEC chain writer"
    vars:
      target_table: "silver.FactInternetSales"
      target_procedure: "silver.usp_load_FactInternetSales"
      expected_status: "resolved"
      expected_writer: "factinternetsales"
      allow_zero_migrate: "true"

  # ── cross-db-exec: DimCrossDbProfile cross-database delegation
  - description: "cross-db-exec — DimCrossDbProfile cross-database delegation"
    vars:
      target_table: "silver.DimCrossDbProfile"
      target_procedure: "silver.usp_load_DimCrossDbProfile"
      expected_status: "resolved"
      expected_writer: "dimcrossdbprofile"

  # ── dynamic-sp-executesql: DimCurrency dynamic SQL writer ───
  - description: "dynamic-sp-executesql — DimCurrency dynamic SQL writer"
    vars:
      target_table: "silver.DimCurrency"
      target_procedure: "silver.usp_load_DimCurrency"
      expected_status: "resolved"
      expected_writer: "dimcurrency"

  # ── exec-variable: ExecVariableTarget dynamic EXEC(@sql) ────
  - description: "exec-variable — ExecVariableTarget dynamic EXEC(@sql)"
    vars:
      target_table: "silver.ExecVariableTarget"
      target_procedure: "silver.usp_scope_ExecVariable"
      expected_status: "resolved"
      expected_writer: "execvariable"
      expected_source: "llm"
      expected_statement_terms: "insert into silver.execvariabletarget"

  # ── exec-concat: ExecConcatTarget concatenated EXEC ─────────
  - description: "exec-concat — ExecConcatTarget concatenated EXEC"
    vars:
      target_table: "silver.ExecConcatTarget"
      target_procedure: "silver.usp_scope_ExecConcat"
      expected_status: "resolved"
      expected_writer: "execconcat"
      expected_source: "llm"
      expected_statement_terms: "insert into silver.execconcattarget"

  # ── linked-server-exec: LinkedServerExecTarget skip ────────
  - description: "linked-server-exec — LinkedServerExecTarget linked-server EXEC skip"
    vars:
      target_table: "silver.LinkedServerExecTarget"
      target_procedure: "silver.usp_scope_LinkedServerExec"
      expected_status: "resolved,no_writer_found"
      allow_zero_migrate: "true"
      expected_action: "skip"

  # ── Tier 3: 3+ multi-writer disambiguation ────────────────
  - description: "multi-writer-3 — DimMultiWriter 3-writer disambiguation"
    vars:
      target_table: "silver.DimMultiWriter"
      target_procedure: "silver.usp_load_DimMultiWriter_Full"
      expected_status: "resolved"
      expected_writer: "dimmultiwriter_full"

  # ── Tier 3: IF/ELSE dynamic SQL branching ─────────────────
  - description: "if-else-dynamic — DimDynamicBranch conditional sp_executesql"
    vars:
      target_table: "silver.DimDynamicBranch"
      target_procedure: "silver.usp_load_DimDynamicBranch"
      expected_status: "resolved"
      expected_writer: "dimdynamicbranch"
