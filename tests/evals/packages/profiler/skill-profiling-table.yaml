# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Profile skill — LLM profiling of tables for migration"

prompts:
  - file://../../prompts/skill-profiling-table.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 60
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
  assert:
    - type: javascript
      value: file://../../assertions/check-table-profile.js

tests:
  # ── fact table with rich catalog signals ──────────────────────
  - description: "fact-rich-catalog — FactInternetSales"
    vars:
      target_table: "silver.FactInternetSales"
      writer: "silver.usp_stage_FactInternetSales"

  # ── dim merge ─────────────────────────────────────────────────
  - description: "dim-merge — DimProduct MERGE INTO"
    vars:
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"

  # ── exec call chain includes related-procedure context ───────
  - description: "exec-call-chain — FactExecProfile surfaces helper proc context"
    vars:
      target_table: "silver.FactExecProfile"
      writer: "silver.usp_load_FactExecProfile"
      expected_kind: "fact_transaction"
      expected_status: "ok"

  # ── cross-db exec reports partial limitation ──────────────────
  - description: "cross-db-exec — DimCrossDbProfile stays partial with limitation"
    vars:
      target_table: "silver.DimCrossDbProfile"
      writer: "silver.usp_load_DimCrossDbProfile"
      expected_status: "partial"
      expected_output_terms: "cross-database,partial"
