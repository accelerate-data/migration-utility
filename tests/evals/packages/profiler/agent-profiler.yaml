description: "Profiler agent — batch profiling from MigrationTest"

prompts:
  - file://../../prompts/agent-profiler.txt

providers:
  - 'exec: ./run-claude.sh'

defaultTest:
  vars:
    fixture_path: "{{FIXTURE_PATH | default('tests/evals/fixtures/migration-test')}}"
  assert:
    - type: is-json
    - type: javascript
      value: |
        const d = JSON.parse(output);
        return d.status === 'ok' || d.status === 'partial';
    - type: contains
      value: "profile context"

tests:
  # ── fact table with rich catalog signals ──────────────────────
  - description: "fact-rich-catalog — FactInternetSales"
    vars:
      target_table: "silver.FactInternetSales"
      writer: "silver.usp_stage_FactInternetSales"
      scenario_id: "fact-rich-catalog"
    assert:
      - type: javascript
        value: |
          const kinds = ['fact_transaction','fact_periodic_snapshot','fact_accumulating_snapshot',
            'dim_full_reload','dim_non_scd','dim_scd1','dim_scd2','dim_junk','fact_aggregate'];
          const d = JSON.parse(output);
          return d.classification && kinds.includes(d.classification.resolved_kind);
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.classification && ['catalog','llm','catalog+llm'].includes(d.classification.source);

  # ── dim full reload ───────────────────────────────────────────
  - description: "dim-full-reload — DimProduct"
    vars:
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      scenario_id: "dim-full-reload"
    assert:
      - type: javascript
        value: |
          const d = JSON.parse(output);
          return d.classification && d.classification.resolved_kind;
      # TODO: tighten assertion to specific classification once fixture confirms behavior

  # ── dim SCD2 ──────────────────────────────────────────────────
  # TODO: requires SCD2 fixture in MigrationTest schema

  # ── PII detection ─────────────────────────────────────────────
  # TODO: requires PII fixture in MigrationTest schema
