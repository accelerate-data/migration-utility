description: "Profile skill — LLM profiling of tables for migration"

prompts:
  - file://../../prompts/skill-profile.txt

providers:
  - 'exec: bash run-claude.sh'

defaultTest:
  vars:
    fixture_path: "{{FIXTURE_PATH | default('tests/evals/fixtures/migration-test')}}"

tests:
  # ── fact table with rich catalog signals ──────────────────────
  - description: "fact-rich-catalog — FactInternetSales"
    vars:
      target_table: "silver.FactInternetSales"
      writer: "silver.usp_stage_FactInternetSales"
    assert:
      - type: contains
        value: "Classification"
      - type: contains
        value: "Primary key"
      - type: contains
        value: "profile context"
      - type: contains
        value: "profile write"
      # TODO: assert specific classification in prose once fixture is extracted

  # ── dim full reload ───────────────────────────────────────────
  - description: "dim-full-reload — DimProduct TRUNCATE+INSERT"
    vars:
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
    assert:
      - type: contains
        value: "Classification"
      - type: contains
        value: "profile context"
      - type: contains
        value: "profile write"
      # TODO: assert dim_full_reload or dim_scd1 classification

  # ── dim SCD2 ──────────────────────────────────────────────────
  # TODO: requires SCD2 fixture in MigrationTest schema
