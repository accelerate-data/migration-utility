# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Reviewing-tests skill — branch coverage and fixture quality gate"

prompts:
  - file://../../prompts/skill-reviewing-tests.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: ../..
      max_turns: 60
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      append_allowed_tools:
        - Read
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    fixture_path: "tests/evals/fixtures/migration-test"
    iteration_suffix: ""
  assert:
    - type: javascript
      value: file://../../assertions/check-test-review.js

tests:
  # Reviewer may flag NOT NULL source columns (e.g. ProductNumber, MakeFlag) missing
  # from given[] even though the proc never SELECTs them — these are irrelevant to dbt
  # unit tests and the fixtures correctly include all proc-used columns.
  - description: "approved — DimProduct complete branch coverage and realistic fixtures"
    vars:
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      expected_status: "approved,revision_requested"
      min_covered_branches: 2

  - description: "revision-requested — DimCustomer incomplete coverage and poor fixture quality"
    vars:
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      expected_status: "revision_requested"

  # --- VU-868: pattern-specific review cases ---

  # Reviewer may flag NOT NULL source columns (e.g. ProductNumber, MakeFlag) missing
  # from given[] — the proc only SELECTs ProductID and ProductName from bronze.Product,
  # so the other NOT NULL columns are irrelevant to dbt unit test fixtures.
  - description: "approved — InsertSelectTarget complete branch coverage for non-MERGE pattern"
    vars:
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_status: "approved,revision_requested"
      min_covered_branches: 1

  - description: "revision-requested — UpdateJoinTarget missing join-miss scenario"
    vars:
      target_table: "silver.UpdateJoinTarget"
      writer: "silver.usp_load_UpdateJoinTarget"
      expected_status: "revision_requested"

  - description: "revision-requested — IfElseTarget missing one control-flow arm"
    vars:
      target_table: "silver.IfElseTarget"
      writer: "silver.usp_load_IfElseTarget"
      expected_status: "revision_requested"

  - description: "revision-requested — FactExecProfile catalog/DDL column mismatch and missing source catalog"
    vars:
      target_table: "silver.FactExecProfile"
      writer: "silver.usp_load_FactExecProfile"
      expected_status: "revision_requested"
      min_covered_branches: 1

  - description: "approved — DimCurrency partial coverage with untestable dynamic SQL rationale"
    vars:
      target_table: "silver.DimCurrency"
      writer: "silver.usp_load_DimCurrency"
      expected_status: "approved"

  # --- VU-878: fixture quality review scenarios ---

  - description: "not-null-flagged — InsertSelectTarget reviewer catches missing NOT NULL columns"
    vars:
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_status: "revision_requested"
      expected_issue_terms: "not null"
