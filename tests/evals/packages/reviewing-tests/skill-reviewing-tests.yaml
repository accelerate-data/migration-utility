# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Reviewing-tests skill — branch coverage and fixture quality gate"

prompts:
  - id: reviewing-tests
    label: reviewing-tests
    raw: file://../../prompts/skill-reviewing-tests.txt
  - id: reviewing-tests-view
    label: reviewing-tests-view
    raw: file://../../prompts/skill-reviewing-tests-view.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 60
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Bash
        - Glob
        - Grep

defaultTest:
  vars:
    iteration_suffix: ""
  assert:
    - type: javascript
      value: file://../../assertions/check-test-review.js

tests:
  # Reviewer may flag NOT NULL source columns (e.g. ProductNumber, MakeFlag) missing
  # from given[] even though the proc never SELECTs them — these are irrelevant to dbt
  # unit tests and the fixtures correctly include all proc-used columns.
  - description: "review-approved — DimProduct complete branch coverage"
    prompts: ["reviewing-tests"]
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-tests/review-approved"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
      expected_status: "approved"
      min_covered_branches: 2

  - description: "review-revision — DimCustomer incomplete coverage"
    prompts: ["reviewing-tests"]
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-tests/review-revision"
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      expected_status: "revision_requested"

  # --- VU-868: pattern-specific review cases ---

  # Reviewer may flag NOT NULL source columns (e.g. ProductNumber, MakeFlag) missing
  # from given[] — the proc only SELECTs ProductID and ProductName from bronze.Product,
  # so the other NOT NULL columns are irrelevant to dbt unit test fixtures.
  - description: "review-approved-insert-select — InsertSelectTarget non-MERGE pattern"
    prompts: ["reviewing-tests"]
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-tests/review-approved-insert-select"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_status: "approved"
      min_covered_branches: 1

  - description: "review-revision-update-join — UpdateJoinTarget missing join-miss"
    prompts: ["reviewing-tests"]
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-tests/review-revision-update-join"
      target_table: "silver.UpdateJoinTarget"
      writer: "silver.usp_load_UpdateJoinTarget"
      expected_status: "revision_requested"

  - description: "review-revision-if-else — IfElseTarget missing control-flow arm"
    prompts: ["reviewing-tests"]
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-tests/review-revision-if-else"
      target_table: "silver.IfElseTarget"
      writer: "silver.usp_load_IfElseTarget"
      expected_status: "revision_requested"

  - description: "review-revision-exec-chain — FactExecProfile catalog mismatch"
    prompts: ["reviewing-tests"]
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-tests/review-revision-exec-chain"
      target_table: "silver.FactExecProfile"
      writer: "silver.usp_load_FactExecProfile"
      expected_status: "approved"
      min_covered_branches: 1

  - description: "review-approved-dynamic-sql — DimCurrency partial with untestable rationale"
    prompts: ["reviewing-tests"]
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-tests/review-approved-dynamic-sql"
      target_table: "silver.DimCurrency"
      writer: "silver.usp_load_DimCurrency"
      expected_status: "approved"

  # --- VU-878: fixture quality review scenarios ---

  - description: "review-not-null — InsertSelectTarget missing NOT NULL columns"
    prompts: ["reviewing-tests"]
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-tests/review-not-null"
      target_table: "silver.InsertSelectTarget"
      writer: "silver.usp_load_InsertSelectTarget"
      expected_status: "approved"

  # --- VU-880: deferred reviewing-tests scenarios ---

  - description: "review-approved-with-warnings — DimCustomer approves with warnings at iteration 2"
    prompts: ["reviewing-tests"]
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-tests/review-approved-with-warnings"
      target_table: "silver.DimCustomer"
      writer: "silver.usp_load_DimCustomer_Full"
      iteration_suffix: " --iteration 2"
      expected_status: "approved_with_warnings"

  # --- view scenarios ---

  - description: "review-approved-view-where — vw_ActiveProducts WHERE filter coverage"
    prompts: ["reviewing-tests-view"]
    vars:
      fixture_path: "tests/evals/fixtures/reviewing-tests/review-approved-view-where"
      target_table: "silver.vw_ActiveProducts"
      expected_status: "approved"
      min_covered_branches: 2
