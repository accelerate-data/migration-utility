# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "generate-tests command — multi-table test generation + review loop (no sandbox)"

prompts:
  - id: cmd-generate-tests
    label: cmd-generate-tests
    raw: file://../../prompts/cmd-generate-tests.txt

extensions:
  - file://../../scripts/run-workspace-extension.js:extensionHook

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-haiku-4-5-20251001
      working_dir: ../..
      max_turns: 100
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

defaultTest:
  assert:
    - type: javascript
      value: file://../../assertions/check-command-summary.js

tests:
  # ── happy path: single table generates spec cleanly ─────────
  - description: "happy-path — InsertSelectTarget generates spec"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-tests/happy-path"
      target_tables: "silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.InsertSelectTarget": "ok"}'

  # ── review-cycle: single table triggers review cycle ─────────
  - description: "review-cycle — CorrelatedSubqueryTarget review loop"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-tests/review-cycle"
      target_tables: "silver.CorrelatedSubqueryTarget"
      expected_item_statuses: '{"silver.CorrelatedSubqueryTarget": "partial"}'

  - description: "review-loop-targeted-repair — IfElseTarget requires reviewer feedback then second-pass repair"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-tests/review-loop-targeted-repair"
      target_tables: "silver.IfElseTarget"
      target_table: "silver.IfElseTarget"
      expected_item_statuses: '{"silver.IfElseTarget": "ok"}'
      expected_item_review_iterations: '{"silver.IfElseTarget": 2}'
      expected_item_review_verdicts: '{"silver.IfElseTarget": "approved,approved_with_warnings"}'
      min_covered_branches: 2
      expected_branch_ids: "if_premium_path,else_standard_path"
      rejected_uncovered_branches: "else_standard_path"
      min_scenario_count: 2
    assert:
      - type: javascript
        value: file://../../assertions/check-command-summary.js
      - type: javascript
        value: file://../../assertions/check-test-review.js
      - type: javascript
        value: file://../../assertions/check-test-spec.js
      - type: javascript
        value: file://../../assertions/check-ifelsetarget-branch-semantics.js

  - description: "existing-artifact-merge-review — IfElseTarget starts from an existing partial spec and still gets reviewed"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-tests/existing-artifact-merge-review"
      target_tables: "silver.IfElseTarget"
      target_table: "silver.IfElseTarget"
      expected_item_statuses: '{"silver.IfElseTarget": "ok"}'
      expected_item_review_iterations: '{"silver.IfElseTarget": 1}'
      expected_item_review_verdicts: '{"silver.IfElseTarget": "approved,approved_with_warnings"}'
      min_covered_branches: 2
      expected_branch_ids: "if_premium_path,else_standard_path"
      rejected_uncovered_branches: "else_standard_path"
      min_scenario_count: 2
    assert:
      - type: javascript
        value: file://../../assertions/check-command-summary.js
      - type: javascript
        value: file://../../assertions/check-test-review.js
      - type: javascript
        value: file://../../assertions/check-test-spec.js
      - type: javascript
        value: file://../../assertions/check-ifelsetarget-branch-semantics.js

  - description: "review-approved-with-warnings — DimCustomer reaches iteration 2 and stops at approved_with_warnings"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-tests/review-approved-with-warnings"
      target_tables: "silver.DimCustomer"
      target_table: "silver.DimCustomer"
      expected_item_statuses: '{"silver.DimCustomer": "ok,partial"}'
      expected_item_review_iterations: '{"silver.DimCustomer": 2}'
      expected_item_review_verdicts: '{"silver.DimCustomer": "approved_with_warnings"}'
      expected_command_review_verdict: "approved_with_warnings"
      min_branch_review_count: 1
      min_scenario_review_count: 1
      expected_warning_terms: "coverage_partial,fixture_quality_warning"
    assert:
      - type: javascript
        value: file://../../assertions/check-command-summary.js
      - type: javascript
        value: file://../../assertions/check-command-review-result.js

  # ── error-clean: missing-scoping table + good table ─────────
  - description: "error-clean — DimProduct no scoping + InsertSelectTarget ok"
    vars:
      fixture_path: "tests/evals/fixtures/cmd-generate-tests/error-clean"
      target_tables: "silver.DimProduct silver.InsertSelectTarget"
      expected_item_statuses: '{"silver.DimProduct": "ok", "silver.InsertSelectTarget": "ok"}'
