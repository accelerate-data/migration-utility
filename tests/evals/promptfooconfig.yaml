# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Full promptfoo suite for migration eval harness"

prompts:
  - id: profiling-table
    label: profiling-table
    raw: file://prompts/skill-profiling-table.txt
  - id: generating-model
    label: generating-model
    raw: file://prompts/skill-generating-model.txt
  - id: generating-tests
    label: generating-tests
    raw: file://prompts/skill-generating-tests.txt
  - id: reviewing-tests
    label: reviewing-tests
    raw: file://prompts/skill-reviewing-tests.txt
  - id: reviewing-model
    label: reviewing-model
    raw: file://prompts/skill-reviewing-model.txt
  - id: analyzing-table
    label: analyzing-table
    raw: file://prompts/skill-analyzing-table.txt
  - id: cmd-scope
    label: cmd-scope
    raw: file://prompts/cmd-scope.txt
  - id: cmd-profile
    label: cmd-profile
    raw: file://prompts/cmd-profile.txt
  - id: cmd-generate-model
    label: cmd-generate-model
    raw: file://prompts/cmd-generate-model.txt
  - id: cmd-generate-tests
    label: cmd-generate-tests
    raw: file://prompts/cmd-generate-tests.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: .
      max_turns: 80
      permission_mode: bypassPermissions
      allow_dangerously_skip_permissions: true
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

tests:
  - description: "fact-rich-catalog — FactInternetSales"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/migration-test"
      target_table: "silver.FactInternetSales"
      writer: "silver.usp_stage_FactInternetSales"
    assert:
      - type: javascript
        value: file://assertions/check-table-profile.js

  - description: "dim-merge — DimProduct MERGE INTO"
    prompts: ["profiling-table"]
    vars:
      fixture_path: "tests/evals/fixtures/migration-test"
      target_table: "silver.DimProduct"
      writer: "silver.usp_load_DimProduct"
    assert:
      - type: javascript
        value: file://assertions/check-table-profile.js

  - description: "exec-call-chain — FactExecProfile surfaces helper proc context"
