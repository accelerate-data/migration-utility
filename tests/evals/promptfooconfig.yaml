# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Full promptfoo suite for migration eval harness"

# Naming convention: "<skill> — <sql-pattern> — <detail>"
# Enables --filter-pattern filtering, e.g.:
#   promptfoo eval --filter-pattern "generating-model"
#   promptfoo eval --filter-pattern "insert-select"
#   promptfoo eval --filter-pattern "generating-model.*exec"
# See docs/design/eval-harness/README.md for the full taxonomy.

prompts:
  - id: profiling-table
    label: profiling-table
    raw: file://prompts/skill-profiling-table.txt
  - id: generating-model
    label: generating-model
    raw: file://prompts/skill-generating-model.txt
  - id: generating-tests
    label: generating-tests
    raw: file://prompts/skill-generating-tests.txt
  - id: reviewing-tests
    label: reviewing-tests
    raw: file://prompts/skill-reviewing-tests.txt
  - id: analyzing-table
    label: analyzing-table
    raw: file://prompts/skill-analyzing-table.txt
  - id: cmd-scope
    label: cmd-scope
    raw: file://prompts/cmd-scope.txt
  - id: cmd-profile
    label: cmd-profile
    raw: file://prompts/cmd-profile.txt
  - id: cmd-generate-model
    label: cmd-generate-model
    raw: file://prompts/cmd-generate-model.txt
  - id: cmd-generate-tests
    label: cmd-generate-tests
    raw: file://prompts/cmd-generate-tests.txt
  - id: refactoring-sql
    label: refactoring-sql
    raw: file://prompts/skill-refactoring-sql.txt
  - id: analyzing-table-view
    label: analyzing-table-view
    raw: file://prompts/skill-analyzing-table-view.txt
  - id: profiling-table-view
    label: profiling-table-view
    raw: file://prompts/skill-profiling-table-view.txt

providers:
  - id: anthropic:claude-agent-sdk
    config:
      model: claude-sonnet-4-6
      working_dir: .
      max_turns: 80
      permission_mode: auto
      append_allowed_tools:
        - Read
        - Write
        - Bash
        - Glob
        - Grep

