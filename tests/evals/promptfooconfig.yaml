    prompts: ["analyzing-object"]
    vars:
      fixture_path: "tests/evals/fixtures/migration-test"
      target_table: "silver.usp_load_DimProduct"
      expected_content: "merge"
    assert:
      - type: javascript
        value: file://assertions/check-procedure-catalog.js

