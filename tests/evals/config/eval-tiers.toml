[runtime]
provider_id = "file://scripts/opencode-cli-provider.js"
model_provider_id = "opencode"
model = "qwen3.6-plus"
working_dir = ".."
empty_output_retries = 1

[runtime.tools]
read = true
write = true
edit = true
bash = true
grep = true
glob = true
list = true

[tiers.light]
max_turns = 60

[tiers.standard]
max_turns = 100

[tiers.high]
max_turns = 120

[tiers.x_high]
max_turns = 200
