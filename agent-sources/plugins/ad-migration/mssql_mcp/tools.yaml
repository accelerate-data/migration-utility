# NOT IMPLEMENTED — Live SQL Server MCP server is not yet wired up.
# The tools.yaml schema is defined here for reference.
# See VU-757 for the genai-toolbox integration that will activate this.

sources:
  sqlserver:
    kind: mssql
    host: ${MSSQL_HOST}
    port: ${MSSQL_PORT}
    database: ${MSSQL_DB}
    user: sa
    password: ${SA_PASSWORD}

tools:
  mssql-execute-sql:
    kind: mssql-sql
    source: sqlserver
    description: >
      Execute a SQL query against the project SQL Server database.
      Supports arbitrary T-SQL including system catalog queries
      (sys.sql_expression_dependencies, sys.sql_modules,
      INFORMATION_SCHEMA.ROUTINES).
    statement: |
      {{.sql}}
    templateParameters:
      - name: sql
        type: string
        description: T-SQL statement to execute
