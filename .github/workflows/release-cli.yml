name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-cli:
    runs-on: macos-latest
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build shared artifacts
        run: |
          cd lib
          python -m build

      - name: Build public CLI artifacts
        run: |
          cd packages/ad-migration-cli
          python -m build

      - name: Smoke-test public CLI in a fresh venv
        run: |
          python -m venv /tmp/ad-migration-release
          source /tmp/ad-migration-release/bin/activate
          python -m pip install lib/dist/ad_migration_shared-*.whl
          python -m pip install packages/ad-migration-cli/dist/ad_migration_cli-*.whl
          ad-migration --version

      - name: Publish GitHub release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lib/dist/*
            packages/ad-migration-cli/dist/*

      - name: Compute Homebrew artifact metadata
        id: artifacts
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          cli_sdist="$(basename packages/ad-migration-cli/dist/ad_migration_cli-"${tag}".tar.gz)"
          shared_sdist="$(basename lib/dist/ad_migration_shared-"${tag}".tar.gz)"
          cli_sha="$(shasum -a 256 "packages/ad-migration-cli/dist/${cli_sdist}" | awk '{print $1}')"
          shared_sha="$(shasum -a 256 "lib/dist/${shared_sdist}" | awk '{print $1}')"
          release_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          echo "version=${tag}" >> "$GITHUB_OUTPUT"
          echo "cli_url=${release_base}/${cli_sdist}" >> "$GITHUB_OUTPUT"
          echo "cli_sha256=${cli_sha}" >> "$GITHUB_OUTPUT"
          echo "shared_url=${release_base}/${shared_sdist}" >> "$GITHUB_OUTPUT"
          echo "shared_sha256=${shared_sha}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap formula
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_PAT:-}" ]; then
            echo "::error::HOMEBREW_TAP_PAT secret is required to update accelerate-data/homebrew-tap"
            exit 1
          fi

          tap_dir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/accelerate-data/homebrew-tap.git" "$tap_dir"
          python scripts/update_homebrew_tap.py \
            --version "${{ steps.artifacts.outputs.version }}" \
            --cli-url "${{ steps.artifacts.outputs.cli_url }}" \
            --cli-sha256 "${{ steps.artifacts.outputs.cli_sha256 }}" \
            --shared-url "${{ steps.artifacts.outputs.shared_url }}" \
            --shared-sha256 "${{ steps.artifacts.outputs.shared_sha256 }}" \
            --output "$tap_dir/Formula/ad-migration.rb"

          cd "$tap_dir"
          if git diff --quiet -- Formula/ad-migration.rb; then
            echo "Homebrew formula already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/ad-migration.rb
          git commit -m "Update ad-migration formula for ${GITHUB_REF_NAME}"
          git push origin HEAD
