name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  python-dead-code-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Check Python unused imports and locals
        run: |
          uvx ruff check \
            lib/shared \
            packages/ad-migration-cli/src \
            packages/ad-migration-internal/src \
            mcp/ddl \
            scripts \
            tests/helpers.py \
            tests/conftest.py \
            tests \
            mcp/ddl/tests \
            --select F401,F841 \
            --statistics

  repo-map-audit:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for structural changes requiring repo-map.json update
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          STRUCTURAL_DIRS=(
            ".github/workflows/"
            "skills/"
            "commands/"
            "lib/shared/"
            "packages/"
            "mcp/ddl/"
            "tests/unit/"
          )

          structural_changed=false
          for dir in "${STRUCTURAL_DIRS[@]}"; do
            if git diff --name-only --diff-filter=ADR "$BASE_SHA" "$HEAD_SHA" -- "$dir" | grep -q .; then
              structural_changed=true
              echo "Structural change detected in $dir"
            fi
          done

          if [ "$structural_changed" = true ]; then
            if git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- repo-map.json | grep -q .; then
              echo "repo-map.json was updated — audit passed."
            else
              echo "::error::Structural files were added, removed, or renamed but repo-map.json was not updated."
              echo "Update repo-map.json to reflect the current codebase. See AGENTS.md for details."
              exit 1
            fi
          else
            echo "No structural changes detected — audit passed."
          fi
